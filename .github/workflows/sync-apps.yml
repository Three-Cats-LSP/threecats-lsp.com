name: Sync Apps

on:
  workflow_dispatch:
  repository_dispatch:
    types: [sync-d-planner, sync-t-viewer]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Pull latest D-Planner
        if: github.event.action == 'sync-d-planner' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p d-planner
          curl -H "Authorization: token ${{ secrets.SYNC_TOKEN }}" \
               -H "Accept: application/vnd.github.v3.raw" \
               -L "https://api.github.com/repos/Three-Cats-LSP/LSP_D-planner/contents/index.html" \
               -o d-planner/index.html
          echo "D-Planner synced"

      - name: Pull latest T-Viewer
        if: github.event.action == 'sync-t-viewer' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p t-viewer
          curl -H "Authorization: token ${{ secrets.SYNC_TOKEN }}" \
               -H "Accept: application/vnd.github.v3.raw" \
               -L "https://api.github.com/repos/Three-Cats-LSP/T-Viewer/contents/index.html" \
               -o t-viewer/index.html
          echo "T-Viewer synced"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add d-planner/ t-viewer/
          git diff --staged --quiet || git commit -m "Sync apps from upstream repos"
          git push
