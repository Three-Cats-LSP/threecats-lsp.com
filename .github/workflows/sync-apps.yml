name: Sync Apps

on:
  workflow_dispatch:
  repository_dispatch:
    types: [sync-d-planner, sync-d-planner-ccr, sync-d-planner-plus, sync-t-viewer, sync-get-in-water, sync-apk-d-planner, sync-apk-d-planner-ccr, sync-apk-d-planner-plus, sync-apk-t-viewer, sync-apk-get-in-water]

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Pull latest D-Planner files
        if: github.event.action == 'sync-d-planner' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p d-planner/vendor/fonts d-planner/vendor/icons scripts/readmes
          for f in index.html app-version.js download.html manifest.json sw.js capacitor-bridge.js icon-192.png icon-512.png zhl-engine-bundle.js zhl-schedule-worker.js zhl-worker-bridge.js tests.html tests-extended.html tests-massive.html tests-massive-main.html tests-verify.html; do
            curl -fsSL -H "Authorization: token ${{ secrets.SYNC_TOKEN }}" \
                 -H "Accept: application/vnd.github.v3.raw" \
                 "https://api.github.com/repos/Three-Cats-LSP/LSP_D-planner/contents/${f}" \
                 -o "d-planner/${f}" || echo "skip ${f}"
          done
          for f in vendor/jspdf.umd.min.js vendor/offline-manifest.txt vendor/fonts/fonts.css vendor/fonts/DejaVuSans.ttf vendor/fonts/DejaVuSans-Bold.ttf vendor/icons/giw-icon-192.png; do
            curl -fsSL -H "Authorization: token ${{ secrets.SYNC_TOKEN }}" \
                 -H "Accept: application/vnd.github.v3.raw" \
                 "https://api.github.com/repos/Three-Cats-LSP/LSP_D-planner/contents/${f}" \
                 -o "d-planner/${f}" || echo "skip ${f}"
          done
          curl -fsSL -H "Authorization: token ${{ secrets.SYNC_TOKEN }}" \
               -H "Accept: application/vnd.github.v3.raw" \
               "https://api.github.com/repos/Three-Cats-LSP/LSP_D-planner/contents/README.md" \
               -o "scripts/readmes/d-planner.md" || echo "skip README"
          echo "D-Planner synced"

      - name: Pull latest D-Planner + CCR files
        if: github.event.action == 'sync-d-planner-ccr' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p d-planner-ccr scripts/readmes
          for f in index.html download.html manifest.json sw.js capacitor-bridge.js icon-192.png tests.html tests-extended.html tests-massive.html tests-massive-main.html tests-verify.html tests-pscr-otu-cns.html; do
            curl -fsSL -H "Authorization: token ${{ secrets.SYNC_TOKEN }}" \
                 -H "Accept: application/vnd.github.v3.raw" \
                 "https://api.github.com/repos/Three-Cats-LSP/LSP_D-planner-CCR/contents/${f}" \
                 -o "d-planner-ccr/${f}" || echo "skip ${f}"
          done
          curl -fsSL -H "Authorization: token ${{ secrets.SYNC_TOKEN }}" \
               -H "Accept: application/vnd.github.v3.raw" \
               "https://api.github.com/repos/Three-Cats-LSP/LSP_D-planner-CCR/contents/README.md" \
               -o "scripts/readmes/d-planner-ccr.md" || echo "skip README"
          if [ -f d-planner-ccr/manifest.json ]; then
            sed -i 's|/LSP_D-planner-CCR/|/d-planner-ccr/|g' d-planner-ccr/manifest.json
          fi
          echo "D-Planner + CCR synced"

      - name: Pull latest LSP D-Planner+ files
        if: github.event.action == 'sync-d-planner-plus' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p d-planner-plus/vendor/fonts d-planner-plus/vendor/icons scripts/readmes
          for f in index.html app-version.js download.html manifest.json sw.js capacitor-bridge.js icon-192.png icon-512.png zhl-engine-bundle.js vpm-engine-bundle.js zhl-schedule-worker.js zhl-worker-bridge.js tests.html tests-extended.html tests-massive.html tests-massive-main.html tests-verify.html tests-pscr-otu-cns.html tests-ccr-differential.html; do
            curl -fsSL -H "Authorization: token ${{ secrets.SYNC_TOKEN }}" \
                 -H "Accept: application/vnd.github.v3.raw" \
                 "https://api.github.com/repos/Three-Cats-LSP/LSP_D-planner-plus/contents/${f}" \
                 -o "d-planner-plus/${f}" || echo "skip ${f}"
          done
          mkdir -p d-planner-plus/vendor/fonts d-planner-plus/vendor/icons
          curl -fsSL -H "Authorization: token ${{ secrets.SYNC_TOKEN }}" \
               -H "Accept: application/vnd.github.v3.raw" \
               "https://api.github.com/repos/Three-Cats-LSP/LSP_D-planner-plus/contents/vendor/jspdf.umd.min.js" \
               -o "d-planner-plus/vendor/jspdf.umd.min.js" || echo "skip vendor/jspdf.umd.min.js"
          curl -fsSL -H "Authorization: token ${{ secrets.SYNC_TOKEN }}" \
               -H "Accept: application/vnd.github.v3.raw" \
               "https://api.github.com/repos/Three-Cats-LSP/LSP_D-planner-plus/contents/vendor/offline-manifest.txt" \
               -o "d-planner-plus/vendor/offline-manifest.txt" || echo "skip vendor/offline-manifest.txt"
          while IFS= read -r f || [ -n "$f" ]; do
            [ -z "$f" ] && continue
            mkdir -p "d-planner-plus/$(dirname "$f")"
            curl -fsSL -H "Authorization: token ${{ secrets.SYNC_TOKEN }}" \
                 -H "Accept: application/vnd.github.v3.raw" \
                 "https://api.github.com/repos/Three-Cats-LSP/LSP_D-planner-plus/contents/${f}" \
                 -o "d-planner-plus/${f}" || echo "skip vendor ${f}"
          done < d-planner-plus/vendor/offline-manifest.txt
          curl -fsSL -H "Authorization: token ${{ secrets.SYNC_TOKEN }}" \
               -H "Accept: application/vnd.github.v3.raw" \
               "https://api.github.com/repos/Three-Cats-LSP/LSP_D-planner-plus/contents/README.md" \
               -o "scripts/readmes/d-planner-plus.md" || echo "skip README"
          echo "LSP D-Planner+ synced"

      - name: Pull latest T-Viewer files
        if: github.event.action == 'sync-t-viewer' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p t-viewer scripts/readmes
          for f in index.html download.html manifest.json icon-192.png icon-512.png; do
            curl -fsSL -H "Authorization: token ${{ secrets.SYNC_TOKEN }}" \
                 -H "Accept: application/vnd.github.v3.raw" \
                 "https://api.github.com/repos/Three-Cats-LSP/T-Viewer/contents/${f}" \
                 -o "t-viewer/${f}" || echo "skip ${f}"
          done
          curl -fsSL -H "Authorization: token ${{ secrets.SYNC_TOKEN }}" \
               -H "Accept: application/vnd.github.v3.raw" \
               "https://api.github.com/repos/Three-Cats-LSP/T-Viewer/contents/README.md" \
               -o "scripts/readmes/t-viewer.md" || echo "skip README"
          echo "T-Viewer synced"

      - name: Pull latest D-Planner APK
        if: github.event.action == 'sync-apk-d-planner' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p d-planner
          curl -H "Authorization: token ${{ secrets.SYNC_TOKEN }}" \
               -H "Accept: application/vnd.github.v3.raw" \
               -L "https://api.github.com/repos/Three-Cats-LSP/LSP_D-planner/contents/Android%20Apk/LSP_D-planner.apk" \
               -o d-planner/LSP_D-planner.apk
          echo "D-Planner APK synced"

      - name: Pull latest D-Planner + CCR APK
        if: github.event.action == 'sync-apk-d-planner-ccr' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p d-planner-ccr
          curl -H "Authorization: token ${{ secrets.SYNC_TOKEN }}" \
               -H "Accept: application/vnd.github.v3.raw" \
               -L "https://api.github.com/repos/Three-Cats-LSP/LSP_D-planner-CCR/contents/Android%20Apk/LSP_D-planner-CCR.apk" \
               -o d-planner-ccr/LSP_D-planner-CCR.apk || echo "APK not yet built — skip"
          echo "D-Planner + CCR APK synced"

      - name: Pull latest LSP D-Planner+ APK
        if: github.event.action == 'sync-apk-d-planner-plus' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p d-planner-plus
          curl -H "Authorization: token ${{ secrets.SYNC_TOKEN }}" \
               -H "Accept: application/vnd.github.v3.raw" \
               -L "https://api.github.com/repos/Three-Cats-LSP/LSP_D-planner-plus/contents/Android%20Apk/LSP_D-planner-plus.apk" \
               -o d-planner-plus/LSP_D-planner-plus.apk || echo "APK not yet built — skip"
          echo "LSP D-Planner+ APK synced"

      - name: Pull latest T-Viewer APK
        if: github.event.action == 'sync-apk-t-viewer' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p t-viewer
          curl -H "Authorization: token ${{ secrets.SYNC_TOKEN }}" \
               -H "Accept: application/vnd.github.v3.raw" \
               -L "https://api.github.com/repos/Three-Cats-LSP/T-Viewer/contents/Android%20Apk/T-Viewer.apk" \
               -o t-viewer/T-Viewer.apk
          echo "T-Viewer APK synced"

      - name: Pull latest Get In Water files
        if: github.event.action == 'sync-get-in-water' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p get-in-water/vendor/fonts get-in-water/vendor/firebase scripts/readmes
          for f in index.html download.html manifest.json sw.js capacitor-bridge.js backup-sanitize.js sync.js icon-192.png icon-512.png icon-192-light.png icon-512-light.png; do
            curl -fsSL -H "Authorization: token ${{ secrets.SYNC_TOKEN }}" \
                 -H "Accept: application/vnd.github.v3.raw" \
                 "https://api.github.com/repos/Three-Cats-LSP/Get-In-Water/contents/${f}" \
                 -o "get-in-water/${f}" || echo "skip ${f}"
          done
          for f in vendor/jspdf.umd.min.js vendor/fonts/DejaVuSans.ttf vendor/fonts/DejaVuSans-Bold.ttf vendor/firebase/firebase-app-compat.js vendor/firebase/firebase-auth-compat.js vendor/firebase/firebase-firestore-compat.js; do
            curl -fsSL -H "Authorization: token ${{ secrets.SYNC_TOKEN }}" \
                 -H "Accept: application/vnd.github.v3.raw" \
                 "https://api.github.com/repos/Three-Cats-LSP/Get-In-Water/contents/${f}" \
                 -o "get-in-water/${f}" || echo "skip ${f}"
          done
          curl -fsSL -H "Authorization: token ${{ secrets.SYNC_TOKEN }}" \
               -H "Accept: application/vnd.github.v3.raw" \
               "https://api.github.com/repos/Three-Cats-LSP/Get-In-Water/contents/README.md" \
               -o "scripts/readmes/get-in-water.md" || echo "skip README"
          echo "Get In Water synced"

      - name: Write Get In Water Firebase config
        if: github.event.action == 'sync-get-in-water' || github.event_name == 'workflow_dispatch'
        env:
          FIREBASE_WEB_CONFIG: ${{ secrets.FIREBASE_WEB_CONFIG }}
        run: |
          if [ -n "$FIREBASE_WEB_CONFIG" ]; then
            echo "$FIREBASE_WEB_CONFIG" | base64 -d > get-in-water/firebase-config.js
            echo "firebase-config.js written from FIREBASE_WEB_CONFIG secret"
          else
            echo "FIREBASE_WEB_CONFIG not set — keeping existing get-in-water/firebase-config.js"
          fi

      - name: Pull latest Get In Water APK
        if: github.event.action == 'sync-apk-get-in-water' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p get-in-water
          curl -H "Authorization: token ${{ secrets.SYNC_TOKEN }}" \
               -H "Accept: application/vnd.github.v3.raw" \
               -L "https://api.github.com/repos/Three-Cats-LSP/Get-In-Water/contents/Android%20Apk/Get-In-Water.apk" \
               -o get-in-water/Get-In-Water.apk
          echo "Get In Water APK synced"

      - name: Regenerate about pages
        if: github.event_name == 'workflow_dispatch' || startsWith(github.event.action, 'sync-')
        run: |
          python3 scripts/generate-about.py
          python3 scripts/generate-knowledge-base.py
          python3 scripts/generate-homepage.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add d-planner/ d-planner-ccr/ d-planner-plus/ t-viewer/ get-in-water/ knowledge-base/ scripts/readmes/ scripts/homepage-cards.json about.css
          git diff --staged --quiet || (git commit -m "Sync apps from upstream repos" && git pull --rebase && git push)
