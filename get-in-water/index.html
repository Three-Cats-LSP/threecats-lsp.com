<!DOCTYPE html>

  if (!window.Capacitor) {

<style>
:root {
  --bg: #030c18; --surface: #07121f; --card: #0a1a2e; --card2: #0d2038;
  --border: rgba(0,200,255,0.09); --border-hi: rgba(0,200,255,0.28);
  --accent: #00d9ff; --accent2: #00b8a0;
  --green: #26d07c; --yellow: #ffb703; --orange: #ff6d00; --red: #ff4757;
  --text: #d8eef8; --muted: #3e6882; --tip: #5ba4c2; --dim: #142535;
  --font-ui: 'Outfit', 'Noto Sans', system-ui, -apple-system, 'Segoe UI', sans-serif;
  --font-user: 'Noto Sans', 'Outfit', system-ui, -apple-system, 'Segoe UI', sans-serif;
}
body.light-theme {
  --bg: #ffffff; --surface: #f8f9fa; --card: #eff3f8; --card2: #e8ecf1;
  --border: rgba(0,100,200,0.25); --border-hi: rgba(0,100,200,0.45);
  --accent: #0055aa; --accent2: #005544;
  --green: #1a9e55; --yellow: #FFBF00; --orange: #ff5500; --red: #FF3131;
  --text: #1a1a1a; --muted: #555555; --tip: #4a7fa0; --dim: #cccccc;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--text);
  font-family: var(--font-ui); min-height: 100vh; overflow-x: hidden;
  transition: all 0.4s ease;
  padding: env(safe-area-inset-top,0) env(safe-area-inset-right,0) env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);
}
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 70% 55% at 15% 60%, rgba(0,100,180,0.22) 0%, transparent 60%),
    radial-gradient(ellipse 50% 70% at 85% 20%, rgba(0,60,140,0.18) 0%, transparent 60%),
    linear-gradient(160deg, #030c18 0%, #050e1c 60%, #030c18 100%);
  transition: all 0.4s ease;
}
body.light-theme::before {
  background:
    radial-gradient(ellipse 70% 55% at 15% 60%, rgba(100,180,255,0.05) 0%, transparent 60%),
    linear-gradient(160deg, #ffffff 0%, #ffffff 100%);
}
.bubbles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.bubble {
  position: absolute; border-radius: 50%;
  background: rgba(0,217,255,0.04); border: 1px solid rgba(0,217,255,0.1);
  animation: rise linear infinite;
}
@keyframes rise {
  0% { transform: translateY(0) translateX(0); opacity: 0; }
  10% { opacity: 1; } 90% { opacity: 0.4; }
  100% { transform: translateY(-110vh) translateX(20px); opacity: 0; }
}
.app { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 16px 14px 32px; }
header.hdr {
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 0 12px; gap: 10px; flex-wrap: wrap;
}
.brand { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
.brand-icon {
  width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; overflow: hidden;
  background: #030c18; border: 1px solid var(--accent);
}
.brand-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
.brand-text h1 {
  font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px;
  color: var(--text); line-height: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.brand-text p {

}
.hdr-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.theme-toggle {
  display: inline-flex; align-items: center; justify-content: center;

  border: 1px solid var(--border); background: var(--card);
  color: var(--accent); font-size: 16px; cursor: pointer; transition: all 0.3s;
}
.theme-toggle:hover { border-color: var(--accent); background: rgba(0,200,255,0.1); }
.btn-back {

  border: 1px solid var(--border-hi); border-radius: 6px; cursor: pointer;

.btn-back.btn-close {

}
.card {

  padding: 16px; margin-bottom: 12px; position: relative; overflow: hidden;
}
.card::before {

}
.card-title {

.card-title::after {

.card.collapsible .card-title { cursor: pointer; user-select: none; margin-bottom: 0; display: flex; align-items: center; gap: 6px; flex-wrap: nowrap; }
.card-title-left {

.card-title-right {

.card.collapsible .card-title::after { display: none; }

}

.btn-secondary.btn-icon-only {

.progress-bar {

.icon-btn svg { width: 14px; height: 14px; }
.icon-btn-sm svg { width: 13px; height: 13px; }
.check-box svg { width: 14px; height: 14px; stroke-width: 2.5; }
.btn-export svg { width: 16px; height: 16px; }

.link-card {

#toast {

.modal-box {

<div class="bubbles" id="bubbles"></div>
<div class="app" id="app-root"></div>
<div id="toast"></div>
<div id="modal-overlay">
  <div class="modal-box" id="modal-content"></div>
</div>
<script src="capacitor-bridge.js"></script>
<script>
const APP_VERSION = '1.2.0';
const STORAGE_KEY = 'giw_v1';

let state = null;
let screen = 'home';
let activeTripId = null;
let menuOpen = false;
let aboutTab = 'template';

function uid() { return 'id_' + Math.random().toString(36).slice(2, 11) + Date.now().toString(36); }

function defaultTemplate() {
  const cats = [
    { id: uid(), name: 'Core Dive Gear', order: 0 },
    { id: uid(), name: 'Tanks & Gas', order: 1 },
    { id: uid(), name: 'Camera & Photo', order: 2 },
    { id: uid(), name: 'Travel & Docs', order: 3 },
    { id: uid(), name: 'Personal & Safety', order: 4 }
  ];
  const byName = n => cats.find(c => c.name === n).id;
  const items = [];
  const add = (cat, names) => names.forEach(n => items.push({ id: uid(), categoryId: byName(cat), name: n }));
  add('Core Dive Gear', ['BCD', 'Regulator', 'Fins', 'Mask', 'Wetsuit / Drysuit', 'Weights & belt', 'Dive computer', 'SMB + spool', 'Torch', 'Knife / cutter', 'Surface marker']);
  add('Tanks & Gas', ['Cylinder(s)', 'DIN / Yoke adapter', 'O2 analyzer', 'Stage / deco bottles']);
  add('Camera & Photo', ['Housing', 'Camera body', 'Lens(es)', 'Strobes', 'Sync cords', 'Batteries', 'Chargers', 'Memory cards', 'Desiccant packs', 'Dome port cover']);
  add('Travel & Docs', ['Passport / ID', 'Dive certification', 'Insurance', 'Logbook', 'Dive insurance card', 'Cash / cards']);
  add('Personal & Safety', ['Sunscreen', 'Meds', 'First aid kit', 'Towel', 'Dry bag', 'Snacks / water', 'Phone charger']);
  return { categories: cats, items };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      migrateState(data);
      return data;
    }
  } catch (e) {}
  return {
    masterTemplate: defaultTemplate(),
    trips: [],
    settings: { theme: 'dark' }
  };
}

function ensureTripShape(trip) {
  if (!trip) return;
  if (trip.date && !trip.dateStart) {
    trip.dateStart = trip.date;
    delete trip.date;
  }
  if (!trip.dateEnd) trip.dateEnd = trip.dateStart || '';
  if (!trip.categories && state && state.masterTemplate) {
    trip.categories = state.masterTemplate.categories.map(c => ({
      id: c.id, name: c.name, order: c.order
    }));
  }
}

function migrateState(data) {
  if (!data.trips) data.trips = [];
  const tpl = data.masterTemplate || defaultTemplate();
  data.trips.forEach(trip => {
    if (trip.date && !trip.dateStart) {
      trip.dateStart = trip.date;
      delete trip.date;
    }
    if (!trip.dateEnd) trip.dateEnd = trip.dateStart || '';
    if (!trip.categories && tpl.categories) {
      trip.categories = tpl.categories.map(c => ({
        id: c.id, name: c.name, order: c.order
      }));
    }
  });
}

function getTripCategories(trip) {
  ensureTripShape(trip);
  return [...(trip.categories || [])].sort((a, b) => a.order - b.order);
}

function formatTripDateRange(trip) {
  const start = trip.dateStart || trip.date || '';
  const end = trip.dateEnd || start;
  if (!start) return '';
  try {
    const ds = new Date(start + 'T12:00:00');
    if (!end || end === start) {
      return ds.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
    }
    const de = new Date(end + 'T12:00:00');
    const sameYear = ds.getFullYear() === de.getFullYear();
    const startFmt = ds.toLocaleDateString('en-GB', {
      day: '2-digit', month: 'short', year: sameYear ? undefined : 'numeric'
    });
    const endFmt = de.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
    return startFmt + ' \u2013 ' + endFmt;
  } catch (e) {
    return start;
  }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function getCategories() {
  return [...state.masterTemplate.categories].sort((a, b) => a.order - b.order);
}

function getCategoryName(id) {
  const c = state.masterTemplate.categories.find(x => x.id === id);
  return c ? c.name : 'Other';
}

function tripProgress(trip) {
  const total = trip.items.length;
  const done = trip.items.filter(i => i.checked).length;
  return { done, total, pct: total ? Math.round((done / total) * 100) : 0 };
}

function createTripFromTemplate(name, dateStart, dateEnd) {
  const items = state.masterTemplate.items.map(it => ({
    id: uid(), categoryId: it.categoryId, name: it.name, note: it.note || '',
    checked: false, fromTemplate: true
  }));
  const start = dateStart || '';
  const end = dateEnd || start;
  const trip = {
    id: uid(),
    name,
    dateStart: start,
    dateEnd: end,
    createdAt: Date.now(),
    categories: state.masterTemplate.categories.map(c => ({
      id: c.id, name: c.name, order: c.order
    })),
    items
  };
  state.trips.unshift(trip);
  saveState();
  return trip.id;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

  const s = size || 16;
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${path}</svg>`;

function nextTripCopyName(baseName) {
  const root = baseName.replace(/\s*\(\d+\)\s*$/, '').trim();
  const escaped = root.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp('^' + escaped + '(?: \\((\\d+)\\))?$');
  let max = 1;
  state.trips.forEach(t => {
    const m = t.name.match(re);
    if (m) max = Math.max(max, m[1] ? parseInt(m[1], 10) : 1);
  });
  return max === 1 ? root + ' (2)' : root + ' (' + (max + 1) + ')';
}

function cloneTripFromSource(sourceTrip, name, dateStart, dateEnd) {
  ensureTripShape(sourceTrip);
  const catIdMap = {};
  const categories = sourceTrip.categories.map(c => {
    const newId = uid();
    catIdMap[c.id] = newId;
    return { id: newId, name: c.name, order: c.order };
  });
  const items = sourceTrip.items.map(it => ({
    id: uid(),
    categoryId: catIdMap[it.categoryId] || it.categoryId,
    name: it.name,
    note: it.note || '',
    checked: false,
    fromTemplate: !!it.fromTemplate
  }));
  const start = dateStart || '';
  const end = dateEnd || start;
  const trip = {
    id: uid(),
    name,
    dateStart: start,
    dateEnd: end,
    createdAt: Date.now(),
    categories,
    items
  };
  state.trips.unshift(trip);
  saveState();
  return trip.id;
}

function mountTripDateModal(startId, endId, oneDayId) {
  const startEl = document.getElementById(startId);
  const endEl = document.getElementById(endId);
  document.getElementById(oneDayId).onclick = () => {
    if (startEl.value) {
      endEl.value = startEl.value;
      showToast('One day trip');
    } else {
      showToast('Pick a start date first');
    }
  };
  startEl.addEventListener('change', () => {
    if (!endEl.value || endEl.value < startEl.value) endEl.value = startEl.value;
  });
}

function promptNewTrip() {
  openModal(`
    <h3>New Trip</h3>
    <div class="modal-field"><label>Trip name</label><input id="trip-name" placeholder="e.g. Osezaki" autofocus/></div>
    <div class="modal-field-row">
      <div class="modal-field"><label>Start date</label><input id="trip-date-start" type="date"/></div>
      <div class="modal-field"><label>Finish date</label><input id="trip-date-end" type="date"/></div>
    </div>
    <button class="btn-secondary" id="trip-one-day-btn" style="width:100%;margin-bottom:4px">One day trip</button>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" id="trip-create-btn">Create</button>
    </div>
  `, () => {
    mountTripDateModal('trip-date-start', 'trip-date-end', 'trip-one-day-btn');
    document.getElementById('trip-create-btn').onclick = () => {
      const name = document.getElementById('trip-name').value.trim();
      if (!name) { showToast('Enter a trip name'); return; }
      const dateStart = document.getElementById('trip-date-start').value;
      const dateEnd = document.getElementById('trip-date-end').value || dateStart;
      if (dateStart && dateEnd && dateEnd < dateStart) {
        showToast('Finish date must be on or after start');
        return;

      const id = createTripFromTemplate(name, dateStart, dateEnd);
      closeModal();
      navigate('trip', id);
    };

function renderTrip() {
  const trip = state.trips.find(t => t.id === activeTripId);
  if (!trip) return renderHome();
  ensureTripShape(trip);
  const p = tripProgress(trip);
  const cats = getTripCategories(trip);
  const knownIds = new Set(cats.map(c => c.id));

  let catsHtml = cats.map(cat => {
    const items = trip.items.filter(i => i.categoryId === cat.id);
    return `
      <div class="card collapsible card-open">
        <div class="card-title" onclick="toggleCard(this)">
          <div class="card-title-left" onclick="event.stopPropagation()">
            <input value="${esc(cat.name)}" size="${Math.max(4, cat.name.length)}" onchange="renameTripCategory('${trip.id}','${cat.id}',this.value)" title="Rename card"/>
            <div class="card-title-actions">
              <button class="icon-btn icon-btn-sm" onclick="moveTripCategory('${trip.id}','${cat.id}',-1)" title="Move up">${icon('chevUp', 13)}</button>
              <button class="icon-btn icon-btn-sm" onclick="moveTripCategory('${trip.id}','${cat.id}',1)" title="Move down">${icon('chevDown', 13)}</button>
              <button class="icon-btn icon-btn-sm" onclick="duplicateTripCategory('${trip.id}','${cat.id}')" title="Duplicate card">${icon('copy', 13)}</button>
              <button class="icon-btn icon-btn-sm danger" onclick="removeTripCategory('${trip.id}','${cat.id}')" title="Remove card">${icon('close', 13)}</button>
            </div>
          </div>
          <div class="card-title-right">
            <button class="icon-btn icon-btn-sm card-add-btn" onclick="event.stopPropagation(); addTripItem('${trip.id}','${cat.id}')" title="Add item">${icon('plus', 13)}</button>
            <span class="card-caret">${icon('chevDown', 11)}</span>
          </div>
        </div>
        <div class="card-collapsible-body">
          ${items.length ? items.map(it => `
            <div class="check-item ${it.checked ? 'checked' : ''}">
              <div class="check-main" onclick="toggleTripItem('${trip.id}','${it.id}')">
                <div class="check-box">${it.checked ? icon('check', 14) : ''}</div>
                <div><div class="item-name">${esc(it.name)}</div>${it.note ? `<div class="item-note">${esc(it.note)}</div>` : ''}</div>
              </div>
              <button class="icon-btn danger" onclick="deleteTripItem('${trip.id}','${it.id}')" title="Remove item">${icon('close', 14)}</button>
            </div>`).join('') : `<div class="empty-state" style="padding:12px 4px"><p style="margin:0;font-size:12px">No items yet — tap + to add</p></div>`}
        </div>
      </div>`;
  }).join('');

  const otherItems = trip.items.filter(it => !knownIds.has(it.categoryId));
  if (otherItems.length) {
    catsHtml += `
      <div class="card collapsible card-open">
        <div class="card-title" onclick="toggleCard(this)">
          <div class="card-title-left">Other</div>
          <div class="card-title-right"><span class="card-caret">${icon('chevDown', 11)}</span></div>
        </div>
        <div class="card-collapsible-body">
          ${otherItems.map(it => `
            <div class="check-item ${it.checked ? 'checked' : ''}">
              <div class="check-main" onclick="toggleTripItem('${trip.id}','${it.id}')">
                <div class="check-box">${it.checked ? icon('check', 14) : ''}</div>
                <div><div class="item-name">${esc(it.name)}</div></div>
              </div>
              <button class="icon-btn danger" onclick="deleteTripItem('${trip.id}','${it.id}')" title="Remove item">${icon('close', 14)}</button>
            </div>`).join('')}
        </div>
      </div>`;
  }

  return `
    ${renderHeader(trip.name, formatTripDateRange(trip) || 'Packing checklist', true)}
    <div class="progress-sticky">
      <div class="trip-meta">${p.done} / ${p.total} packed (${p.pct}%)</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${p.pct}%"></div></div>
    </div>
    <div class="action-row">
      <button class="btn-secondary btn-icon-only" onclick="addTripCategory('${trip.id}')" title="Add card">${icon('plus', 18)}</button>
      <button class="btn-export" onclick="exportTripTXT('full')" title="Download .txt">${icon('fileText', 16)}</button>
      <button class="btn-export" onclick="exportTripPDF('full')" title="Export PDF">${iconPdfBtn()}</button>
      <div class="menu-dropdown">
        <button class="btn-secondary btn-icon-only" onclick="toggleMenu(event)" title="More">${icon('menu', 18)}</button>
        <div class="menu-panel ${menuOpen ? 'open' : ''}" id="trip-menu">

function nextCategoryCopyName(categories, sourceName) {
  const baseName = sourceName.replace(/\s*\(\d+\)\s*$/, '').trim();
  const escaped = baseName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp('^' + escaped + '(?: \\((\\d+)\\))?$');
  let max = 1;
  categories.forEach(c => {
    const m = c.name.match(re);
    if (m) max = Math.max(max, m[1] ? parseInt(m[1], 10) : 1);
  });
  return max === 1 ? baseName + ' (2)' : baseName + ' (' + (max + 1) + ')';
}

function duplicateTripCategory(tripId, catId) {
  const trip = state.trips.find(t => t.id === tripId);
  if (!trip) return;
  ensureTripShape(trip);
  const src = trip.categories.find(c => c.id === catId);
  if (!src) return;
  const order = Math.max(...trip.categories.map(c => c.order)) + 1;
  const newCatId = uid();
  const newName = nextCategoryCopyName(trip.categories, src.name);
  trip.categories.push({ id: newCatId, name: newName, order });
  trip.items.filter(i => i.categoryId === catId).forEach(it => {
    trip.items.push({
      id: uid(), categoryId: newCatId, name: it.name, note: it.note || '',
      checked: false, fromTemplate: false
    });
  });
  saveState();
  navigate('trip', tripId);
}

function moveTripCategory(tripId, catId, dir) {
  const trip = state.trips.find(t => t.id === tripId);
  if (!trip) return;
  const cats = getTripCategories(trip);
  const idx = cats.findIndex(c => c.id === catId);
  const swap = idx + dir;
  if (swap < 0 || swap >= cats.length) return;
  const tmp = cats[idx].order;
  cats[idx].order = cats[swap].order;
  cats[swap].order = tmp;
  saveState();
  navigate('trip', tripId);
}

function safeFilename(s) {
  return String(s).replace(/[^a-zA-Z0-9_-]+/g, '_').replace(/^_|_$/g, '') || 'Trip';
}
function dateStr() { return new Date().toISOString().split('T')[0]; }

function buildTemplateText() {
  const lines = [
    '═══════════════════════════════════════',
    '  GET IN WATER — Master Gear Template',
    '  Three Cats LSP · threecats-lsp.com',
    '═══════════════════════════════════════', ''
  ];
  getCategories().forEach(cat => {
    lines.push(`▸ ${cat.name.toUpperCase()}`);
    state.masterTemplate.items.filter(i => i.categoryId === cat.id).forEach(it => {
      lines.push(`  • ${it.name}`);
    });
    lines.push('');
  });
  lines.push('— Generated by Get In Water v' + APP_VERSION);
  return lines.join('\n');
}

function buildTripText(trip, mode) {
  const p = tripProgress(trip);
  const lines = [
    '═══════════════════════════════════════',
    '  GET IN WATER — Trip Packing List',
    '  Three Cats LSP · threecats-lsp.com',
    '═══════════════════════════════════════',
    `Trip: ${trip.name}`,
    formatTripDateRange(trip) ? `Dates: ${formatTripDateRange(trip)}` : '',
    `Progress: ${p.done}/${p.total} packed`,
    mode === 'remaining' ? '(Remaining items only)' : '',
    ''
  ].filter(Boolean);

  const cats = getTripCategories(trip);
  let items = trip.items;
  if (mode === 'remaining') items = items.filter(i => !i.checked);
  const knownIds = new Set(cats.map(c => c.id));

  cats.forEach(cat => {
    const catItems = items.filter(i => i.categoryId === cat.id);
    if (!catItems.length) return;
    lines.push(`▸ ${cat.name.toUpperCase()}`);
    catItems.forEach(it => {
      const mark = it.checked ? '[x]' : '[ ]';
      lines.push(`  ${mark} ${it.name}`);
    });
    lines.push('');
  });

  const otherItems = items.filter(i => !knownIds.has(i.categoryId));
  if (otherItems.length) {
    lines.push('▸ OTHER');
    otherItems.forEach(it => {
      const mark = it.checked ? '[x]' : '[ ]';
      lines.push(`  ${mark} ${it.name}`);
    });
    lines.push('');
  }
  lines.push('— Generated by Get In Water v' + APP_VERSION);
  return lines.join('\n');
}

function downloadBlob(text, filename, mime) {
  const blob = new Blob([text], { type: mime });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
  showExportToast();
}

function exportTemplateTXT() {

// ── PDF export (DejaVu Sans — full Unicode / Cyrillic) ──
let _pdfFontCache = null;
async function loadPDFFonts(doc) {
  if (_pdfFontCache) {
    doc.addFileToVFS('DejaVuSans.ttf', _pdfFontCache.regular);
    doc.addFileToVFS('DejaVuSans-Bold.ttf', _pdfFontCache.bold);
    doc.addFont('DejaVuSans.ttf', 'DejaVuSans', 'normal');
    doc.addFont('DejaVuSans-Bold.ttf', 'DejaVuSans', 'bold');
    doc.setFont('DejaVuSans', 'normal');
    return true;
  }
  try {
    const [rResp, bResp] = await Promise.all([
      fetch('https://cdn.jsdelivr.net/npm/dejavu-fonts-ttf@2.37.3/ttf/DejaVuSans.ttf'),
      fetch('https://cdn.jsdelivr.net/npm/dejavu-fonts-ttf@2.37.3/ttf/DejaVuSans-Bold.ttf')
    ]);
    if (!rResp.ok || !bResp.ok) throw new Error('Font fetch failed');
    const [rBuf, bBuf] = await Promise.all([rResp.arrayBuffer(), bResp.arrayBuffer()]);
    function toBase64(buf) {
      const bytes = new Uint8Array(buf);
      const CHUNK = 8192;
      let bin = '';
      for (let i = 0; i < bytes.length; i += CHUNK) {
        bin += String.fromCharCode.apply(null, bytes.subarray(i, i + CHUNK));
      }
      return btoa(bin);
    }
    _pdfFontCache = { regular: toBase64(rBuf), bold: toBase64(bBuf) };
    doc.addFileToVFS('DejaVuSans.ttf', _pdfFontCache.regular);
    doc.addFileToVFS('DejaVuSans-Bold.ttf', _pdfFontCache.bold);
    doc.addFont('DejaVuSans.ttf', 'DejaVuSans', 'normal');
    doc.addFont('DejaVuSans-Bold.ttf', 'DejaVuSans', 'bold');
    doc.setFont('DejaVuSans', 'normal');
    return true;
  } catch (e) {
    console.error('[GIW] DejaVu font load failed:', e);
    alert('Could not load PDF fonts. Check your internet connection and try again.');
    return false;
  }
}

const PDF_PW = 210;
const PDF_PH = 297;
const PDF_ML = 16;
const PDF_MR = 16;
const PDF_HEADER_H = 12;
const PDF_FOOTER_H = 8;
const PDF_CONTENT_TOP = PDF_HEADER_H + 3;
const PDF_CONTENT_BOT = PDF_PH - PDF_FOOTER_H - 3;
const PDF_CW = PDF_PW - PDF_ML - PDF_MR;
const PDF_SECTION_BAR_H = 6;
const PDF_SECTION_GAP = 4;
const PDF_ITEM_ROW_H = 5.5;

function formatPdfDate(dateStr) {
  if (!dateStr) {
    return new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
  }
  try {
    return new Date(dateStr + 'T12:00:00').toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
  } catch (e) {
    return dateStr;
  }
}

async function buildPdfDoc(meta, sections) {
  const { jsPDF } = window.jspdf;
  if (!jsPDF) { alert('PDF library not loaded.'); return null; }
  const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
  if (!(await loadPDFFonts(doc))) return null;

  let y = PDF_CONTENT_TOP;
  const nowStr = new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
  const tripDate = meta.date || formatPdfDate(meta.dateStart);

  function drawHeader() {
    doc.setFillColor(3, 12, 24);
    doc.rect(0, 0, PDF_PW, PDF_HEADER_H, 'F');
    doc.setFillColor(0, 180, 220);
    doc.roundedRect(PDF_ML, 2, 8, 8, 1.5, 1.5, 'F');
    doc.setFont('DejaVuSans', 'bold');
    doc.setFontSize(6.5);
    doc.setTextColor(255, 255, 255);
    doc.text('GIW', PDF_ML + 4, 7.2, { align: 'center' });
    doc.setFontSize(9);
    doc.text('GET IN WATER', PDF_ML + 11, 5.8);
    doc.setFont('DejaVuSans', 'normal');
    doc.setFontSize(7.5);
    doc.text(meta.tripLabel || 'Packing Checklist', PDF_ML + 11, 9.5);
    doc.text(tripDate, PDF_PW - PDF_MR, 5.8, { align: 'right' });
    if (meta.subtitle) {
      doc.setFontSize(6.5);
      doc.text(meta.subtitle, PDF_PW - PDF_MR, 9.2, { align: 'right' });
    }
    doc.setTextColor(0, 0, 0);
    y = PDF_CONTENT_TOP;
  }

  function drawFooter() {
    doc.setFillColor(235, 245, 252);
    doc.rect(0, PDF_PH - PDF_FOOTER_H, PDF_PW, PDF_FOOTER_H, 'F');
    doc.setFont('DejaVuSans', 'normal');
    doc.setFontSize(6.5);
    doc.setTextColor(70, 90, 110);
    doc.text('\u00a9 Three Cats LSP  \u00b7  @threecats_lsp  \u00b7  Have a safe and fun trip!', PDF_ML, PDF_PH - 3.2);
    doc.text('Exported ' + nowStr + '  \u00b7  v' + APP_VERSION, PDF_PW - PDF_MR, PDF_PH - 3.2, { align: 'right' });
    doc.setTextColor(0, 0, 0);
  }

  function checkY(need) {
    if (y + need > PDF_CONTENT_BOT) {
      drawFooter();
      doc.addPage();
      drawHeader();
    }
  }

  let sectionIndex = 0;

  function drawSectionTitle(title) {
    const gap = sectionIndex === 0 ? 0 : PDF_SECTION_GAP;
    sectionIndex += 1;
    checkY(gap + PDF_SECTION_BAR_H + 3);
    y += gap;
    doc.setFillColor(0, 130, 180);
    doc.rect(PDF_ML, y, PDF_CW, PDF_SECTION_BAR_H, 'F');
    doc.setFont('DejaVuSans', 'bold');
    doc.setFontSize(8);
    doc.setTextColor(255, 255, 255);
    doc.text(title, PDF_ML + 2, y + 4.2);
    doc.setTextColor(0, 0, 0);
    y += PDF_SECTION_BAR_H + 3;
  }

  function drawItemLine(line) {
    doc.setFont('DejaVuSans', 'normal');
    doc.setFontSize(9);
    const wrapped = doc.splitTextToSize(line, PDF_CW - 6);
    const blockH = PDF_ITEM_ROW_H * wrapped.length;
    checkY(blockH + 1.5);
    wrapped.forEach((row, i) => {
      doc.text(row, PDF_ML + 3, y + 3.8 + i * PDF_ITEM_ROW_H);
    });
    y += blockH + 1.5;
  }

  drawHeader();

  if (meta.modeLabel) {
    checkY(6);
    doc.setFont('DejaVuSans', 'normal');
    doc.setFontSize(8);
    doc.setTextColor(90, 110, 130);
    doc.text(meta.modeLabel, PDF_ML, y + 3.2);
    doc.setTextColor(0, 0, 0);
    y += 6;
  }

  sections.forEach(sec => {
    drawSectionTitle(sec.title);
    sec.items.forEach(item => {
      const line = typeof item === 'string' ? item : item.line;
      drawItemLine(line);
    });
  });

  drawFooter();
  return doc;
}

async function exportTemplatePDF() {
  const sections = getCategories().map(cat => ({
    title: cat.name,
    items: state.masterTemplate.items
      .filter(i => i.categoryId === cat.id)
      .map(it => '\u2022  ' + it.name)
  }));
  const doc = await buildPdfDoc({
    tripLabel: 'Master Gear Template',
    date: '',
    subtitle: 'Three Cats LSP'
  }, sections);
  if (doc) doc.save('GIW_' + dateStr() + '_MasterTemplate.pdf');
  showExportToast();
}

async function exportTripPDF(mode) {
  const trip = state.trips.find(t => t.id === activeTripId);
  if (!trip) return;
  const p = tripProgress(trip);
  let items = trip.items;
  if (mode === 'remaining') items = items.filter(i => !i.checked);

  const sections = getTripCategories(trip).map(cat => ({
    title: cat.name,
    items: items.filter(i => i.categoryId === cat.id).map(it => (it.checked ? '\u2611  ' : '\u2610  ') + it.name)
  })).filter(sec => sec.items.length);
  const knownIds = new Set(getTripCategories(trip).map(c => c.id));
  const orphanItems = items.filter(i => !knownIds.has(i.categoryId));
  if (orphanItems.length) {
    sections.push({
      title: 'Other',
      items: orphanItems.map(it => (it.checked ? '\u2611  ' : '\u2610  ') + it.name)
    });
  }

  const doc = await buildPdfDoc({
    tripLabel: trip.name,
    date: formatTripDateRange(trip),
    subtitle: p.done + '/' + p.total + ' packed',
    modeLabel: mode === 'remaining' ? 'Remaining items only' : ''
  }, sections);

  const tag = mode === 'remaining' ? 'Remaining' : 'Full';
  if (doc) doc.save('GIW_' + dateStr() + '_' + safeFilename(trip.name) + '_' + tag + '.pdf');
  showExportToast();
}
