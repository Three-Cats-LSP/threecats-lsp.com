.trip-mode-actions { display: flex; gap: 6px; flex-shrink: 0; margin-left: auto; }

.critical-banner {
  background: rgba(255,109,0,0.15); border: 1px solid var(--orange); border-radius: 10px;
  padding: 10px 12px; margin-bottom: 10px; font-size: 12px; color: var(--orange); line-height: 1.45;
}
.ready-banner {
  background: rgba(38,208,124,0.15); border: 1px solid var(--green); border-radius: 10px;
  padding: 10px 12px; margin-bottom: 10px; font-size: 13px; color: var(--green); text-align: center;
}
.check-item.critical-item .item-name::before { content: '★ '; color: var(--orange); }
.item-meta { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; align-items: center; }

  display: flex; align-items: center; justify-content: center; padding: 0;
}
.qty-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; min-width: 28px; text-align: center; color: var(--tip); }
.check-item .item-actions { display: flex; gap: 4px; flex-shrink: 0; align-items: flex-start; }
.modal-box.modal-wide { max-width: 420px; }
.modal-checklist { max-height: 220px; overflow-y: auto; margin: 8px 0; }
.modal-check-row {
  display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border);
  font-size: 13px; cursor: pointer;
}
.modal-check-row input { width: 16px; height: 16px; accent-color: var(--accent); }
.template-gallery { display: grid; gap: 10px; }
.template-card {
  background: var(--card2); border: 1px solid var(--border); border-radius: 10px; padding: 12px;
}
.template-card-master { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, var(--card2)); }
.template-card h4 { font-size: 14px; margin-bottom: 4px; color: var(--accent); }
.template-card p { font-size: 12px; color: var(--muted); line-height: 1.45; margin-bottom: 8px; }
.template-card-actions { display: flex; flex-wrap: wrap; gap: 6px; }
.template-card-meta { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--muted); margin-bottom: 8px; }
.celebrate-overlay {

  align-items: center; justify-content: center; padding: 20px;
}
.celebrate-overlay.open { display: flex; }
.celebrate-box {
  background: var(--card); border: 1px solid var(--green); border-radius: 16px; padding: 28px 24px;
  text-align: center; max-width: 320px; animation: popIn 0.35s ease;
}
@keyframes popIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.celebrate-box .emoji { font-size: 48px; margin-bottom: 12px; }
.celebrate-box h3 { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; color: var(--green); margin-bottom: 8px; }
.app-footer {
  text-align: center; padding: 14px 0 8px; margin-top: 4px;
}
.app-footer-icons {

}
.app-footer-icon {

  transition: transform 0.2s ease, opacity 0.2s ease;
}

.app-footer-icon img { width: 36px; height: 36px; display: block; object-fit: contain; border-radius: 4px; }
.app-footer-donate-wrap { margin-top: 10px; display: flex; align-items: center; justify-content: center; }
.app-footer-donate {
  display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px;
  background: transparent; border: 1px solid rgba(0,112,186,0.35); border-radius: 20px;
  color: var(--muted); text-decoration: none;
  font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.5px;
  opacity: 0.7; transition: border-color 0.2s, color 0.2s, opacity 0.2s;
}
.app-footer-donate:hover { border-color: #0070ba; color: #0070ba; opacity: 1; }
.app-footer-donate svg { flex-shrink: 0; }
.app-footer-version {
  color: var(--muted); font-family: 'JetBrains Mono', monospace;
  font-size: 10px; margin-top: 6px; letter-spacing: 1px; opacity: 0.5;
}
@media (max-width: 600px) {
  .card { padding: 12px 10px; }
  .card-title input { font-size: 12px; }
  .card.collapsible .card-title { gap: 4px; }
}
</style>
</head>
<body>
<div class="bubbles" id="bubbles"></div>
<div class="app" id="app-root"></div>
<div id="toast"></div>
<div id="modal-overlay">
  <div class="modal-box" id="modal-content"></div>
</div>
<div class="celebrate-overlay" id="celebrate-overlay" onclick="closeCelebrate()">
  <div class="celebrate-box" onclick="event.stopPropagation()">
    <div class="emoji">🤿</div>
    <h3>Ready to dive!</h3>
    <p style="font-size:14px;color:var(--tip);line-height:1.5;margin-bottom:16px">Everything is packed. Have a safe and fun trip!</p>
    <button class="btn-primary" onclick="closeCelebrate()">Let's go</button>
  </div>
</div>
<script src="capacitor-bridge.js"></script>
<script>
const APP_VERSION = '1.4.0';
const IS_NATIVE = !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());
const STORAGE_KEY = 'giw_v1';

const BAG_TAGS = [
  { id: 'carry-on', label: 'Carry-on' },
  { id: 'checked', label: 'Checked bag' },
  { id: 'camera', label: 'Camera case' },
  { id: 'boat', label: 'Boat bin' }
];

const TRIP_SECTIONS = [
  { id: 'night_before', label: 'Night before' },
  { id: 'at_dock', label: 'At the dock' },
  { id: 'before_dive', label: 'Before first dive' },
  { id: 'after_dive', label: 'After last dive' }
];

const STARTER_TEMPLATES = {
  rec: {
    name: 'Recreational diver',
    desc: 'Day boat / resort essentials — core gear, travel docs, personal items.',
    categories: ['Core Dive Gear', 'Travel & Docs', 'Personal & Safety'],
    items: {
      'Core Dive Gear': ['BCD', 'Regulator', 'Fins', 'Mask', 'Wetsuit', 'Weights & belt', 'Dive computer', 'SMB + spool', 'Surface marker'],
      'Travel & Docs': ['Passport / ID', 'Dive certification', 'Insurance', 'Logbook', 'Cash / cards'],
      'Personal & Safety': ['Sunscreen', 'Meds', 'Towel', 'Dry bag', 'Snacks / water', 'Phone charger']
    }
  },
  photo: {
    name: 'Underwater photographer',
    desc: 'Camera housing, strobes, batteries, and dive gear for photo trips.',
    categories: ['Core Dive Gear', 'Camera & Photo', 'Travel & Docs', 'Personal & Safety'],
    items: {
      'Core Dive Gear': ['BCD', 'Regulator', 'Fins', 'Mask', 'Wetsuit / Drysuit', 'Dive computer', 'SMB + spool'],
      'Camera & Photo': ['Housing', 'Camera body', 'Lens(es)', 'Strobes', 'Sync cords', 'Batteries', 'Chargers', 'Memory cards', 'Desiccant packs', 'Dome port cover', 'Focus light'],
      'Travel & Docs': ['Passport / ID', 'Dive certification', 'Insurance', 'Customs paperwork for camera gear'],
      'Personal & Safety': ['Dry bag', 'Lens cloth', 'Snacks / water', 'Phone charger']
    }
  },
  tech: {
    name: 'Technical diver',
    desc: 'Stages, deco gas, redundancy, and travel for tech diving.',
    categories: ['Core Dive Gear', 'Tanks & Gas', 'Travel & Docs', 'Personal & Safety'],
    items: {
      'Core Dive Gear': ['BCD / wing', 'Primary reg', 'Backup reg', 'Fins', 'Mask', 'Drysuit / undersuit', 'Dive computer', 'Backup computer', 'SMB + spool', 'Backup SMB', 'Torch', 'Backup torch', 'Knife / cutter', 'Slates / wet notes'],
      'Tanks & Gas': ['Back gas cylinder(s)', 'Stage / deco bottles', 'DIN / Yoke adapter', 'O2 analyzer', 'Gas analysis log', 'Tank keys / tool'],
      'Travel & Docs': ['Passport / ID', 'Tech certification', 'Insurance', 'Logbook', 'Dive insurance card'],
      'Personal & Safety': ['First aid kit', 'O2 kit checklist', 'Meds', 'Dry bag', 'Snacks / water']
    }
  }
};

let state = null;
let screen = 'home';
let activeTripId = null;
let menuOpen = false;
let exportMenuOpen = false;
let aboutTab = 'starters';
let homeSearch = '';
let activeSavedTemplateId = null;
let editingMasterGear = false;

function starterToSaved(key, tpl) {
  const categories = tpl.categories.map((name, order) => ({ id: uid(), name, order }));
  const byName = n => categories.find(c => c.name === n).id;
  const items = [];
  tpl.categories.forEach(catName => {
    (tpl.items[catName] || []).forEach(name => {
      items.push({ id: uid(), categoryId: byName(catName), name, note: '', qty: 1, packed: 0, critical: false, bag: '', sections: [] });
    });
  });
  return { id: 'starter_' + key, name: tpl.name, desc: tpl.desc, builtIn: true, categories, items };
}

function getDefaultSavedTemplates() {
  return Object.entries(STARTER_TEMPLATES).map(([key, tpl]) => starterToSaved(key, tpl));
}

function getSavedTemplate(id) {
  return state.savedTemplates && state.savedTemplates.find(t => t.id === id);
}

function ensureSavedTemplates(data) {
  if (!data.savedTemplates || !data.savedTemplates.length) {
    data.savedTemplates = getDefaultSavedTemplates();
    return;
  }
  data.savedTemplates.forEach(t => {
    if (!t.categories) t.categories = [];
    if (!t.items) t.items = [];
    if (t.desc == null) t.desc = '';
    if (t.builtIn == null) t.builtIn = false;
    t.items.forEach(ensureItem);
  });
}

function uid() { return 'id_' + Math.random().toString(36).slice(2, 11) + Date.now().toString(36); }

function defaultTemplate() {
  const cats = [
    { id: uid(), name: 'Core Dive Gear', order: 0 },
    { id: uid(), name: 'Tanks & Gas', order: 1 },
    { id: uid(), name: 'Camera & Photo', order: 2 },
    { id: uid(), name: 'Travel & Docs', order: 3 },
    { id: uid(), name: 'Personal & Safety', order: 4 }
  ];
  const byName = n => cats.find(c => c.name === n).id;
  const items = [];
  const add = (cat, names) => names.forEach(n => items.push({ id: uid(), categoryId: byName(cat), name: n }));
  add('Core Dive Gear', ['BCD', 'Regulator', 'Fins', 'Mask', 'Wetsuit / Drysuit', 'Weights & belt', 'Dive computer', 'SMB + spool', 'Torch', 'Knife / cutter', 'Surface marker']);
  add('Tanks & Gas', ['Cylinder(s)', 'DIN / Yoke adapter', 'O2 analyzer', 'Stage / deco bottles']);
  add('Camera & Photo', ['Housing', 'Camera body', 'Lens(es)', 'Strobes', 'Sync cords', 'Batteries', 'Chargers', 'Memory cards', 'Desiccant packs', 'Dome port cover']);
  add('Travel & Docs', ['Passport / ID', 'Dive certification', 'Insurance', 'Logbook', 'Dive insurance card', 'Cash / cards']);
  add('Personal & Safety', ['Sunscreen', 'Meds', 'First aid kit', 'Towel', 'Dry bag', 'Snacks / water', 'Phone charger']);
  items.forEach(ensureItem);
  return { categories: cats, items };
}

function ensureItem(item) {
  if (!item) return item;
  if (!item.qty || item.qty < 1) item.qty = 1;
  if (item.packed == null) item.packed = item.checked ? item.qty : 0;
  if (item.returnPacked == null) item.returnPacked = 0;
  if (item.critical == null) item.critical = false;
  if (item.bag == null) item.bag = '';
  if (!Array.isArray(item.sections)) item.sections = [];
  if (item.note == null) item.note = '';
  item.packed = Math.max(0, Math.min(item.packed, item.qty));
  item.returnPacked = Math.max(0, Math.min(item.returnPacked, item.qty));
  item.checked = item.packed >= item.qty;
  return item;
}

function itemPackedCount(item, trip) {
  ensureItem(item);
  if (trip && trip.returnMode) return item.returnPacked || 0;
  return item.packed;
}

function isItemPacked(item, trip) {
  ensureItem(item);
  return itemPackedCount(item, trip) >= item.qty;
}

function bagLabel(id) {
  const b = BAG_TAGS.find(x => x.id === id);
  return b ? b.label : '';
}

function parseTagsInput(str) {
  return String(str || '').split(/[\s,]+/).map(t => t.trim()).filter(Boolean)
    .map(t => (t.startsWith('#') ? t : '#' + t).toLowerCase());
}

function formatTagsHtml(tags) {
  if (!tags || !tags.length) return '';
  return tags.map(t => `<span class="trip-tag">${esc(t)}</span>`).join('');
}

function tripCountdown(trip) {
  const start = trip.dateStart || '';
  if (!start) return '';
  try {
    const today = new Date(); today.setHours(12, 0, 0, 0);
    const ds = new Date(start + 'T12:00:00');
    const diff = Math.round((ds - today) / 86400000);
    if (diff > 0) return diff + ' day' + (diff !== 1 ? 's' : '');
    if (diff === 0) return 'Today';
    const end = trip.dateEnd || start;
    const de = new Date(end + 'T12:00:00');
    if (today <= de) return 'In progress';
    return '';
  } catch (e) { return ''; }
}

function itemMatchesSection(item, sectionId) {
  ensureItem(item);
  if (!sectionId || sectionId === 'all') return true;
  if (!item.sections.length) return true;
  return item.sections.includes(sectionId);
}

function itemDisplayName(item) {
  ensureItem(item);
  return item.qty > 1 ? item.qty + '\u00d7 ' + item.name : item.name;
}

function copyItemFields(src) {
  ensureItem(src);
  return {
    name: src.name, note: src.note || '', qty: src.qty, packed: 0, returnPacked: 0,
    critical: !!src.critical, bag: src.bag || '', sections: [...(src.sections || [])],
    checked: false, fromTemplate: !!src.fromTemplate
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      migrateState(data);
      return data;
    }
  } catch (e) {}
  const fresh = {
    masterTemplate: defaultTemplate(),
    trips: [],
    savedTemplates: getDefaultSavedTemplates(),
    settings: { theme: 'dark', homeSort: 'created', hideCompleted: false, showArchived: false, pinnedTripId: null }
  };
  return fresh;
}

function ensureTripShape(trip) {
  if (!trip) return;
  if (trip.date && !trip.dateStart) {
    trip.dateStart = trip.date;
    delete trip.date;
  }
  if (!trip.dateEnd) trip.dateEnd = trip.dateStart || '';
  if (trip.location == null) trip.location = '';
  if (!Array.isArray(trip.tags)) trip.tags = [];
  if (trip.archived == null) trip.archived = false;
  if (trip.unpackMode == null) trip.unpackMode = false;
  if (trip.returnMode == null) trip.returnMode = false;
  if (trip.returnCelebrated == null) trip.returnCelebrated = false;
  if (trip.viewSection == null) trip.viewSection = 'all';
  if (trip.celebrated == null) trip.celebrated = false;
  if (!trip.categories && state && state.masterTemplate) {
    trip.categories = state.masterTemplate.categories.map(c => ({
      id: c.id, name: c.name, order: c.order
    }));
  }
  if (trip.items) trip.items.forEach(ensureItem);
}

function migrateState(data) {
  if (!data.masterTemplate) data.masterTemplate = defaultTemplate();
  if (data.masterTemplate.items) data.masterTemplate.items.forEach(ensureItem);
  if (!data.trips) data.trips = [];
  ensureSettingsFromData(data);
  ensureSavedTemplates(data);
  data.trips.forEach(trip => {
    if (trip.date && !trip.dateStart) {
      trip.dateStart = trip.date;
      delete trip.date;
    }
    if (!trip.dateEnd) trip.dateEnd = trip.dateStart || '';
    if (trip.location == null) trip.location = '';
    if (!Array.isArray(trip.tags)) trip.tags = [];
    if (trip.archived == null) trip.archived = false;
    if (trip.unpackMode == null) trip.unpackMode = false;
    if (trip.returnMode == null) trip.returnMode = false;
    if (trip.returnCelebrated == null) trip.returnCelebrated = false;
    if (trip.viewSection == null) trip.viewSection = 'all';
    if (trip.celebrated == null) trip.celebrated = false;
    const tpl = data.masterTemplate;
    if (!trip.categories && tpl.categories) {
      trip.categories = tpl.categories.map(c => ({
        id: c.id, name: c.name, order: c.order
      }));
    }
    if (trip.items) trip.items.forEach(it => {
      ensureItem(it);
      if (it.checked && it.packed === 0) it.packed = it.qty;
    });
  });
}

function ensureSettingsFromData(data) {
  if (!data.settings) data.settings = { theme: 'dark', homeSort: 'created', hideCompleted: false, showArchived: false, pinnedTripId: null };
  if (!data.settings.homeSort) data.settings.homeSort = 'created';
  if (data.settings.hideCompleted == null) data.settings.hideCompleted = false;
  if (data.settings.showArchived == null) data.settings.showArchived = false;
}

function ensureSettings() { ensureSettingsFromData(state); }

function getTripCategories(trip) {
  ensureTripShape(trip);
  return [...(trip.categories || [])].sort((a, b) => a.order - b.order);
}

function formatTripDateRange(trip) {
  const start = trip.dateStart || trip.date || '';
  const end = trip.dateEnd || start;
  if (!start) return '';
  try {
    const ds = new Date(start + 'T12:00:00');
    if (!end || end === start) {
      return ds.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
    }
    const de = new Date(end + 'T12:00:00');
    const sameYear = ds.getFullYear() === de.getFullYear();
    const startFmt = ds.toLocaleDateString('en-GB', {
      day: '2-digit', month: 'short', year: sameYear ? undefined : 'numeric'
    });
    const endFmt = de.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
    return startFmt + ' \u2013 ' + endFmt;
  } catch (e) {
    return start;
  }
}

function persistLocalOnly() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  updateWidgetSnapshot();
}

function saveState() {
  if (window.GIW_SYNC) GIW_SYNC.touchSyncMeta(state);
  persistLocalOnly();
  if (window.GIW_SYNC) GIW_SYNC.schedulePush();
}

function widgetModeLabel(trip) {
  if (trip.returnMode) return 'return';
  if (trip.unpackMode) return 'unpack';
  return 'pack';
}

function buildWidgetPayload() {
  const tripId = state.settings && state.settings.pinnedTripId;
  if (!tripId) {
    return JSON.stringify({ name: 'Get In Water', remaining: -1, total: 0, done: 0, mode: 'pack' });
  }
  const trip = state.trips.find(t => t.id === tripId);
  if (!trip || trip.archived) {
    return JSON.stringify({ name: 'Get In Water', remaining: -1, total: 0, done: 0, mode: 'pack' });
  }
  ensureTripShape(trip);
  const p = tripProgress(trip);
  return JSON.stringify({
    name: trip.name,
    remaining: p.total - p.done,
    total: p.total,
    done: p.done,
    mode: widgetModeLabel(trip),
    updated: Date.now()
  });
}

function pushWidgetToNative(payload) {
  if (!window.Capacitor || !Capacitor.isNativePlatform || !Capacitor.isNativePlatform()) return;
  const tryUpdate = () => {
    const wb = Capacitor.Plugins && Capacitor.Plugins.WidgetBridge;
    if (wb && wb.update) return wb.update({ json: payload });
    return Promise.reject(new Error('WidgetBridge unavailable'));
  };
  tryUpdate().catch(() => {
    setTimeout(() => { tryUpdate().catch(() => {}); }, 300);
    setTimeout(() => { tryUpdate().catch(() => {}); }, 1200);
  });
}

function updateWidgetSnapshot() {
  const payload = buildWidgetPayload();
  try {
    localStorage.setItem('giw_widget', payload);
    pushWidgetToNative(payload);
  } catch (e) {}
}

function getCategories() {
  return [...state.masterTemplate.categories].sort((a, b) => a.order - b.order);
}

function getCategoryName(id) {
  const c = state.masterTemplate.categories.find(x => x.id === id);
  return c ? c.name : 'Other';
}

function tripProgress(trip) {
  ensureTripShape(trip);
  let total = 0, done = 0;
  trip.items.forEach(i => {
    ensureItem(i);
    total += i.qty;
    done += trip.returnMode ? (i.returnPacked || 0) : i.packed;
  });
  return { done, total, pct: total ? Math.round((done / total) * 100) : 0 };
}

function tripIsComplete(trip) {
  const p = tripProgress(trip);
  return p.total > 0 && p.done >= p.total;
}

function criticalItemsRemaining(trip) {
  ensureTripShape(trip);
  return trip.items.filter(i => i.critical && !isItemPacked(i, trip));
}

function createTripFromTemplate(name, dateStart, dateEnd, location, tags, sourceId) {
  sourceId = sourceId || '__master__';
  let categories, items;
  if (sourceId === '__master__') {
    categories = state.masterTemplate.categories.map(c => ({
      id: c.id, name: c.name, order: c.order
    }));
    items = state.masterTemplate.items.map(it => ({
      id: uid(), categoryId: it.categoryId, ...copyItemFields(it)
    }));
  } else {
    const tpl = getSavedTemplate(sourceId);
    if (!tpl) return null;
    const catIdMap = {};
    categories = tpl.categories.map(c => {
      const newId = uid();
      catIdMap[c.id] = newId;
      return { id: newId, name: c.name, order: c.order };
    });
    items = tpl.items
      .filter(it => catIdMap[it.categoryId])
      .map(it => ({
        id: uid(), categoryId: catIdMap[it.categoryId], ...copyItemFields(it)
      }));
  }
  const start = dateStart || '';
  const end = dateEnd || start;
  const trip = {
    id: uid(), name, location: location || '', tags: tags || [],
    dateStart: start, dateEnd: end, createdAt: Date.now(),
    archived: false, unpackMode: false, returnMode: false, viewSection: 'all', celebrated: false, returnCelebrated: false,
    categories, items
  };
  state.trips.unshift(trip);
  saveState();
  return trip.id;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function jsAttr(s) {
  const t = String(s);
  if (t === '') return '';
  if (!/^[a-zA-Z0-9_-]+$/.test(t)) return '_invalid';
  return t.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

function icon(name, size) {
  if (name === 'merge') return iconMerge(size);
  const path = ICON_PATHS[name];

function nextTripCopyName(baseName) {
  const root = baseName.replace(/\s*\(\d+\)\s*$/, '').trim();
  const escaped = root.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp('^' + escaped + '(?: \\((\\d+)\\))?$');
  let max = 1;
  state.trips.forEach(t => {
    const m = t.name.match(re);
    if (m) max = Math.max(max, m[1] ? parseInt(m[1], 10) : 1);
  });
  return max === 1 ? root + ' (2)' : root + ' (' + (max + 1) + ')';
}

function cloneTripFromSource(sourceTrip, name, dateStart, dateEnd, options) {
  options = options || {};
  ensureTripShape(sourceTrip);
  const catFilter = options.categoryIds;
  const catIdMap = {};
  const categories = sourceTrip.categories
    .filter(c => !catFilter || catFilter.includes(c.id))
    .map(c => {
      const newId = uid();
      catIdMap[c.id] = newId;
      return { id: newId, name: c.name, order: c.order };
    });
  const items = sourceTrip.items
    .filter(it => catIdMap[it.categoryId])
    .map(it => ({
      id: uid(), categoryId: catIdMap[it.categoryId],
      ...copyItemFields(it)
    }));
  const start = dateStart || '';
  const end = dateEnd || start;
  const trip = {
    id: uid(), name,
    location: options.location != null ? options.location : (sourceTrip.location || ''),
    tags: options.tags ? [...options.tags] : [...(sourceTrip.tags || [])],
    dateStart: start, dateEnd: end, createdAt: Date.now(),
    archived: false, unpackMode: false, returnMode: false, viewSection: 'all', celebrated: false, returnCelebrated: false,
    categories, items
  };
  state.trips.unshift(trip);
  saveState();
  return trip.id;
}

function getHomeTrips() {
  ensureSettings();
  let trips = state.trips.filter(t => {
    ensureTripShape(t);
    if (t.archived && !state.settings.showArchived) return false;
    if (state.settings.hideCompleted && tripIsComplete(t) && !t.archived) return false;
    return true;
  });
  const q = homeSearch.trim().toLowerCase();
  if (q) {
    trips = trips.filter(t => {
      const hay = [t.name, t.location, ...(t.tags || []), ...t.items.map(i => i.name + ' ' + (i.note || ''))].join(' ').toLowerCase();
      return hay.includes(q.replace(/^#/, '')) || (t.tags || []).some(tag => tag.toLowerCase().includes(q));
    });
  }
  const sort = state.settings.homeSort;
  trips.sort((a, b) => {
    if (sort === 'name') return a.name.localeCompare(b.name);
    if (sort === 'progress') return tripProgress(b).pct - tripProgress(a).pct;
    if (sort === 'date') {
      const da = a.dateStart || '', db = b.dateStart || '';
      if (da && db) return da.localeCompare(db);
      if (da) return -1;
      if (db) return 1;
    }
    return (b.createdAt || 0) - (a.createdAt || 0);
  });
  return trips;
}

      brandContent = `
        <button class="btn-back" onclick="navigate('home')">← Back</button>
        <div class="brand-text trip-header-text">
          <h1>${esc(title || 'Trip')}</h1>
          ${subtitle ? `<p>${esc(subtitle)}</p>` : ''}
          ${tagsHtml}
        </div>`;
    }
  } else {
    brandContent = `<div class="brand-icon"><img id="brandLogo" src="${appLogoSrc()}" width="44" height="44" alt=""/></div>
        <div class="brand-text"><h1>${esc(title || 'GET IN WATER')}</h1><p>${esc(subtitle || 'Trip Packing Checklist')}</p></div>`;
  }
  const hdrClass = showBack && screen === 'trip' ? 'hdr trip-hdr-wrap' : 'hdr';
  return `
    <header class="${hdrClass}">
      <div class="brand${showBack && screen === 'trip' ? ' trip-hdr' : ''}">
        ${brandContent}
      </div>
      <div class="hdr-actions">
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme"><span class="theme-icon" id="themeIcon">🌙</span></button>
        ${screen === 'home' ? `<button class="btn-back btn-close" onclick="navigate('about')" title="About">?</button>` : ''}
      </div>
    </header>`;
}

function renderHomeTripsHtml() {
  ensureSettings();
  const trips = getHomeTrips();
  if (!trips.length) {
    return `<div class="empty-state"><div style="font-size:36px">🧳</div><p>${homeSearch ? 'No trips match your search.' : 'No trips yet.<br>Create one from your master gear template.'}</p></div>`;
  }
  return trips.map(t => {
    const p = tripProgress(t);
    const dateStr = formatTripDateRange(t);
    const countdown = tripCountdown(t);
    const pinned = state.settings.pinnedTripId === t.id;
    return `
      <div class="trip-card ${t.archived ? 'archived' : ''}">
        <div class="trip-card-head">
          <div class="trip-card-main" onclick="navigate('trip','${jsAttr(t.id)}')">
            <h3>${esc(t.name)}${pinned ? ' 📌' : ''}${t.archived ? ' <span style="font-size:11px;color:var(--muted)">(archived)</span>' : ''}</h3>
            ${t.location ? `<div class="trip-location">${esc(t.location)}</div>` : ''}
            <div class="trip-meta">${dateStr ? esc(dateStr) : ''}${dateStr && countdown ? ' · ' : ''}${countdown ? `<span class="trip-countdown">${esc(countdown)}</span> · ` : ''}${p.done}/${p.total} packed</div>
            ${(t.tags && t.tags.length) ? `<div class="trip-tags">${formatTagsHtml(t.tags)}</div>` : ''}
          </div>
          <div class="trip-card-actions">
            <button class="icon-btn icon-btn-sm" onclick="promptDuplicateTrip('${jsAttr(t.id)}')" title="Duplicate trip">${icon('copy', 14)}</button>
            <button class="icon-btn icon-btn-sm danger" onclick="deleteTrip('${jsAttr(t.id)}')" title="Remove trip">${icon('close', 14)}</button>
          </div>
        </div>
        <div class="progress-bar" onclick="navigate('trip','${jsAttr(t.id)}')"><div class="progress-fill" style="width:${p.pct}%"></div></div>
      </div>`;
  }).join('');
}

function refreshHomeTrips() {
  const box = document.getElementById('home-trips');
  if (box) box.innerHTML = renderHomeTripsHtml();
}

function setHomeSearch(v) {
  homeSearch = v;
  if (screen === 'home') refreshHomeTrips();
  else render();
}
function setHomeSort(v) { state.settings.homeSort = v; saveState(); render(); }
function setHideCompleted(v) {
  state.settings.hideCompleted = v;
  saveState();
  if (screen === 'home') refreshHomeTrips();
  else render();
}
function setShowArchived(v) {
  state.settings.showArchived = v;
  saveState();
  if (screen === 'home') refreshHomeTrips();
  else render();
}

function renderTemplateContent() {
  const cats = getCategories();
  const itemCount = state.masterTemplate.items.length;
  let html = `
    <p style="font-size:13px;color:var(--tip);line-height:1.55;margin-bottom:12px">Your <strong>master gear list</strong> — ${itemCount} item${itemCount !== 1 ? 's' : ''} in ${cats.length} card${cats.length !== 1 ? 's' : ''}. New trips start from this list.</p>
    <div class="export-row">
      <div class="menu-dropdown">
        <button class="btn-export btn-icon-only" onclick="toggleExportMenu(event)" title="Export">${icon('fileText', 16)}</button>
        <div class="menu-panel ${exportMenuOpen ? 'open' : ''}" id="master-export-menu">
          <button onclick="doTemplateExport('txt')">Master gear (TXT)</button>
          <button onclick="doTemplateExport('pdf')">Master gear (PDF)</button>
        </div>
      </div>
      <button class="btn-secondary btn-icon-only" onclick="addCategory()" title="Add card">${icon('plus', 18)}</button>
    </div>`;
  cats.forEach((cat) => {
    const items = state.masterTemplate.items.filter(i => i.categoryId === cat.id);
    html += `
      <div class="card collapsible card-open" id="cat-${cat.id}">
        <div class="card-title" onclick="toggleCard(this)">
          <div class="card-title-left" onclick="event.stopPropagation()">
            <input value="${esc(cat.name)}" size="${Math.max(4, cat.name.length)}" onchange="renameCategory('${jsAttr(cat.id)}',this.value)" title="Rename card"/>
            <div class="card-title-actions">
              <button class="icon-btn icon-btn-sm" onclick="moveCategory('${jsAttr(cat.id)}',-1)" title="Move up">${icon('chevUp', 13)}</button>
              <button class="icon-btn icon-btn-sm" onclick="moveCategory('${jsAttr(cat.id)}',1)" title="Move down">${icon('chevDown', 13)}</button>
              <button class="icon-btn icon-btn-sm danger" onclick="deleteCategory('${jsAttr(cat.id)}')" title="Remove card">${icon('close', 13)}</button>
            </div>
          </div>
          <div class="card-title-right">
            <button class="icon-btn icon-btn-sm card-add-btn" onclick="event.stopPropagation(); addTemplateItem('${jsAttr(cat.id)}')" title="Add item">${icon('plus', 13)}</button>
            <span class="card-caret">${icon('chevDown', 11)}</span>
          </div>
        </div>
        <div class="card-collapsible-body">
          ${items.length ? items.map(it => renderItemRow({ type: 'template', tripId: '' }, it)).join('') : `<div class="empty-state" style="padding:12px 4px"><p style="margin:0;font-size:12px">No items — tap + to add</p></div>`}
        </div>
      </div>`;
  });
  return html;
}

  const tpl = getSavedTemplate(activeSavedTemplateId);

  const cats = [...tpl.categories].sort((a, b) => a.order - b.order);
  let catsHtml = cats.map(cat => {
    const items = tpl.items.filter(i => i.categoryId === cat.id);
    return `
      <div class="card collapsible card-open">
        <div class="card-title" onclick="toggleCard(this)">
          <div class="card-title-left" onclick="event.stopPropagation()">
            <input value="${esc(cat.name)}" size="${Math.max(4, cat.name.length)}" onchange="renameSavedCategory('${jsAttr(tpl.id)}','${jsAttr(cat.id)}',this.value)" title="Rename card"/>
            <div class="card-title-actions">
              <button class="icon-btn icon-btn-sm" onclick="moveSavedCategory('${jsAttr(tpl.id)}','${jsAttr(cat.id)}',-1)" title="Move up">${icon('chevUp', 13)}</button>
              <button class="icon-btn icon-btn-sm" onclick="moveSavedCategory('${jsAttr(tpl.id)}','${jsAttr(cat.id)}',1)" title="Move down">${icon('chevDown', 13)}</button>
              <button class="icon-btn icon-btn-sm danger" onclick="deleteSavedCategory('${jsAttr(tpl.id)}','${jsAttr(cat.id)}')" title="Remove card">${icon('close', 13)}</button>
            </div>
          </div>
          <div class="card-title-right">
            <button class="icon-btn icon-btn-sm card-add-btn" onclick="event.stopPropagation(); addSavedTemplateItem('${jsAttr(tpl.id)}','${jsAttr(cat.id)}')" title="Add item">${icon('plus', 13)}</button>
            <span class="card-caret">${icon('chevDown', 11)}</span>
          </div>
        </div>
        <div class="card-collapsible-body">
          ${items.length ? items.map(it => renderItemRow({ type: 'saved', tripId: tpl.id }, it)).join('') : `<div class="empty-state" style="padding:12px 4px"><p style="margin:0;font-size:12px">No items — tap + to add</p></div>`}
        </div>
      </div>`;
  }).join('');
  return `
    <div class="action-row">
      <button class="btn-secondary" onclick="closeSavedTemplateEditor()">← All templates</button>
    </div>
    <div class="card">
      <div class="modal-field"><label style="display:block;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px">Template name</label>
        <input style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px;color:var(--text);font-size:14px" value="${esc(tpl.name)}" onchange="updateSavedTemplateMeta('${jsAttr(tpl.id)}',this.value,null)"/></div>
      <div class="modal-field" style="margin-top:10px"><label style="display:block;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px">Description</label>
        <input style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px;color:var(--text);font-size:14px" value="${esc(tpl.desc || '')}" placeholder="What is this template for?" onchange="updateSavedTemplateMeta('${jsAttr(tpl.id)}',null,this.value)"/></div>

      <button class="btn-secondary btn-icon-only" onclick="addSavedCategory('${jsAttr(tpl.id)}')" title="Add card">${icon('plus', 18)}</button>
    </div>
    ${catsHtml}
    <div class="action-row" style="margin-top:8px">
      <button class="btn-primary btn-icon-only" onclick="mergeSavedTemplate('${jsAttr(tpl.id)}')" title="Add to master gear list">${icon('merge', 18)}</button>

function renderItemRow(ctx, it) {
  const { type, tripId } = ctx;
  ensureItem(it);
  if (type === 'template' || type === 'saved') {
    const badges = [];
    if (it.qty > 1) badges.push(`<span class="item-badge">${it.qty}×</span>`);
    if (it.critical) badges.push(`<span class="item-badge">★ critical</span>`);
    if (it.bag) badges.push(`<span class="item-badge">${esc(bagLabel(it.bag))}</span>`);
    const delFn = type === 'saved'
      ? `deleteSavedTemplateItem('${jsAttr(tripId)}','${jsAttr(it.id)}')`
      : `deleteTemplateItem('${jsAttr(it.id)}')`;
    return `
      <div class="edit-row">
        <div style="flex:1;min-width:0">
          <div class="item-name">${esc(it.name)}</div>
          ${it.note ? `<div class="item-note">${esc(it.note)}</div>` : ''}
          ${badges.length ? `<div class="item-meta">${badges.join('')}</div>` : ''}
        </div>
        <button class="icon-btn" onclick="openItemEditor('${type}','${jsAttr(tripId)}','${jsAttr(it.id)}')" title="Edit">${icon('edit', 14)}</button>
        <button class="icon-btn danger" onclick="${delFn}" title="Delete">${icon('close', 14)}</button>
      </div>`;
  }
  const trip = tripId ? state.trips.find(t => t.id === tripId) : null;
  if (trip && trip.unpackMode && it.packed < it.qty) return '';
  const packed = isItemPacked(it, trip);
  if (trip && !itemMatchesSection(it, trip.viewSection)) return '';
  const packedCount = itemPackedCount(it, trip);
  const cls = ['check-item', packed ? 'checked' : '', it.critical ? 'critical-item' : ''].filter(Boolean).join(' ');
  const onToggle = type === 'trip'
    ? `onclick="toggleTripItem('${jsAttr(tripId)}','${jsAttr(it.id)}')"`
    : '';
  const qtyHtml = it.qty > 1 ? `
    <div class="qty-controls" onclick="event.stopPropagation()">
      <button class="qty-btn" onclick="adjustItemQty('${type}','${jsAttr(tripId)}','${jsAttr(it.id)}',-1)">−</button>
      <span class="qty-label">${packedCount}/${it.qty}</span>
      <button class="qty-btn" onclick="adjustItemQty('${type}','${jsAttr(tripId)}','${jsAttr(it.id)}',1)">+</button>
    </div>` : '';
  const badges = [];
  if (it.bag) badges.push(`<span class="item-badge">${esc(bagLabel(it.bag))}</span>`);
  if (it.sections && it.sections.length) {
    it.sections.forEach(sid => {
      const sec = TRIP_SECTIONS.find(s => s.id === sid);
      if (sec) badges.push(`<span class="item-badge">${esc(sec.label)}</span>`);
    });
  }
  const editBtn = `<button class="icon-btn" onclick="event.stopPropagation(); openItemEditor('${type}','${jsAttr(tripId)}','${jsAttr(it.id)}')" title="Edit item">${icon('edit', 14)}</button>`;
  const delBtn = type === 'trip'
    ? `<button class="icon-btn danger" onclick="deleteTripItem('${jsAttr(tripId)}','${jsAttr(it.id)}')" title="Remove item">${icon('close', 14)}</button>`
    : `<button class="icon-btn danger" onclick="deleteTemplateItem('${jsAttr(it.id)}')" title="Delete item">${icon('close', 14)}</button>`;
  return `
    <div class="${cls}">
      <div class="check-main" ${onToggle}>
        <div class="check-box">${packed ? icon('check', 14) : ''}</div>
        <div style="flex:1;min-width:0">
          <div class="item-name">${esc(itemDisplayName(it))}</div>
          ${it.note ? `<div class="item-note">${esc(it.note)}</div>` : ''}
          ${badges.length ? `<div class="item-meta">${badges.join('')}</div>` : ''}
        </div>
      </div>
      ${qtyHtml}
      <div class="item-actions">${editBtn}${delBtn}</div>
    </div>`;
}

function renderTrip() {
  const trip = state.trips.find(t => t.id === activeTripId);
  if (!trip) return renderHome();
  ensureTripShape(trip);
  const p = tripProgress(trip);
  const cats = getTripCategories(trip);
  const knownIds = new Set(cats.map(c => c.id));
  const criticalLeft = criticalItemsRemaining(trip);
  const complete = tripIsComplete(trip);

  if (complete && !trip.unpackMode) {
    if (trip.returnMode && !trip.returnCelebrated) {
      trip.returnCelebrated = true;
      saveState();
      setTimeout(() => openCelebrateOverlay('return'), 300);
    } else if (!trip.returnMode && !trip.celebrated) {
      trip.celebrated = true;
      saveState();
      setTimeout(() => openCelebrateOverlay('pack'), 300);
    }
  }

  const sectionTabs = `<div class="trip-subbar">
    <div class="section-tabs">
      <button class="section-tab ${trip.viewSection === 'all' ? 'active' : ''}" onclick="setTripSection('${jsAttr(trip.id)}','all')">All</button>
      ${TRIP_SECTIONS.map(s => `<button class="section-tab ${trip.viewSection === s.id ? 'active' : ''}" onclick="setTripSection('${jsAttr(trip.id)}','${s.id}')">${esc(s.label)}</button>`).join('')}
    </div>
    <div class="trip-mode-actions">
      <button class="trip-mode-btn ${trip.unpackMode ? 'active' : ''}" onclick="toggleUnpackMode('${jsAttr(trip.id)}')" title="${trip.unpackMode ? 'Exit unpack mode' : 'Unpack mode — tap items as you repack'}">${trip.unpackMode ? 'Unpacking' : 'Unpack'}</button>
      <button class="trip-mode-btn ${trip.returnMode ? 'return-active' : ''}" onclick="toggleReturnMode('${jsAttr(trip.id)}')" title="${trip.returnMode ? 'Exit return mode' : 'Return mode — pack gear for the trip home'}">${trip.returnMode ? 'Returning' : 'Return'}</button>
    </div>
  </div>`;

  let banner = '';
  if (trip.returnMode) {
    if (criticalLeft.length) {
      banner = `<div class="critical-banner">⚠ ${criticalLeft.length} critical item${criticalLeft.length !== 1 ? 's' : ''} not packed for home: ${criticalLeft.slice(0, 3).map(i => esc(i.name)).join(', ')}${criticalLeft.length > 3 ? '…' : ''}</div>`;
    } else if (complete) {
      banner = `<div class="ready-banner">✓ All gear collected — ready to head home!</div>`;
    } else {
      const left = trip.items.filter(i => !isItemPacked(i, trip)).length;
      banner = `<div class="critical-banner" style="border-color:var(--yellow);color:var(--yellow);background:rgba(255,183,3,0.1)">Return mode — ${left} item${left !== 1 ? 's' : ''} still to collect for the trip home</div>`;
    }
  } else if (criticalLeft.length && !trip.unpackMode) {
    banner = `<div class="critical-banner">⚠ ${criticalLeft.length} critical item${criticalLeft.length !== 1 ? 's' : ''} not packed: ${criticalLeft.slice(0, 3).map(i => esc(i.name)).join(', ')}${criticalLeft.length > 3 ? '…' : ''}</div>`;
  } else if (complete && !trip.unpackMode) {
    banner = `<div class="ready-banner">✓ All packed — ready to dive!</div>`;
  } else if (trip.unpackMode) {
    banner = `<div class="critical-banner" style="border-color:var(--accent);color:var(--accent);background:rgba(0,200,255,0.1)">Unpack mode — tap items as you repack</div>`;
  }

  let catsHtml = cats.map(cat => {
    const items = trip.items.filter(i => i.categoryId === cat.id);
    const rows = items.map(it => renderItemRow({ type: 'trip', tripId: trip.id }, it)).filter(Boolean).join('');
    if (!rows && trip.viewSection !== 'all') return '';
    return `
      <div class="card collapsible card-open">
        <div class="card-title" onclick="toggleCard(this)">
          <div class="card-title-left" onclick="event.stopPropagation()">
            <input value="${esc(cat.name)}" size="${Math.max(4, cat.name.length)}" onchange="renameTripCategory('${jsAttr(trip.id)}','${jsAttr(cat.id)}',this.value)" title="Rename card"/>
            <div class="card-title-actions">
              <button class="icon-btn icon-btn-sm" onclick="moveTripCategory('${jsAttr(trip.id)}','${jsAttr(cat.id)}',-1)" title="Move up">${icon('chevUp', 13)}</button>
              <button class="icon-btn icon-btn-sm" onclick="moveTripCategory('${jsAttr(trip.id)}','${jsAttr(cat.id)}',1)" title="Move down">${icon('chevDown', 13)}</button>
              <button class="icon-btn icon-btn-sm" onclick="duplicateTripCategory('${jsAttr(trip.id)}','${jsAttr(cat.id)}')" title="Duplicate card">${icon('copy', 13)}</button>
              <button class="icon-btn icon-btn-sm danger" onclick="removeTripCategory('${jsAttr(trip.id)}','${jsAttr(cat.id)}')" title="Remove card">${icon('close', 13)}</button>
            </div>
          </div>
          <div class="card-title-right">
            <button class="icon-btn icon-btn-sm card-add-btn" onclick="event.stopPropagation(); addTripItem('${jsAttr(trip.id)}','${jsAttr(cat.id)}')" title="Add item">${icon('plus', 13)}</button>
            <span class="card-caret">${icon('chevDown', 11)}</span>
          </div>
        </div>
        <div class="card-collapsible-body">
          ${rows || `<div class="empty-state" style="padding:12px 4px"><p style="margin:0;font-size:12px">No items in this section — tap + to add</p></div>`}
        </div>
      </div>`;
  }).join('');

  const otherItems = trip.items.filter(it => !knownIds.has(it.categoryId));
  const otherRows = otherItems.map(it => renderItemRow({ type: 'trip', tripId: trip.id }, it)).filter(Boolean).join('');
  if (otherRows) {
    catsHtml += `
      <div class="card collapsible card-open">
        <div class="card-title" onclick="toggleCard(this)">
          <div class="card-title-left">Other</div>
          <div class="card-title-right"><span class="card-caret">${icon('chevDown', 11)}</span></div>
        </div>
        <div class="card-collapsible-body">${otherRows}</div>
      </div>`;
  }

  const subtitle = [formatTripDateRange(trip), trip.location].filter(Boolean).join(' · ') || 'Packing checklist';
  const pinned = state.settings.pinnedTripId === trip.id;

  return `
    ${renderHeader(trip.name, subtitle, true, trip.tags)}
    <div class="progress-sticky">
      <div class="trip-meta">${p.done} / ${p.total} ${trip.returnMode ? 'collected' : 'packed'} (${p.pct}%)${trip.returnMode ? ' · Return mode' : trip.unpackMode ? ' · Unpacking' : ''}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${p.pct}%"></div></div>
    </div>
    ${banner}
    ${sectionTabs}
    <div class="action-row">
      <button class="btn-secondary btn-icon-only" onclick="addTripCategory('${jsAttr(trip.id)}')" title="Add card">${icon('plus', 18)}</button>
      <div class="menu-dropdown">
        <button class="btn-export btn-icon-only" onclick="toggleExportMenu(event)" title="Export">${icon('fileText', 16)}</button>
        <div class="menu-panel ${exportMenuOpen ? 'open' : ''}" id="trip-export-menu">
          <button onclick="doTripExport('full','txt')">Full checklist (TXT)</button>
          <button onclick="doTripExport('full','pdf')">Full checklist (PDF)</button>
          <button onclick="doTripExport('remaining','txt')">Remaining items (TXT)</button>
          <button onclick="doTripExport('remaining','pdf')">Remaining items (PDF)</button>
          <button onclick="doTripExport('bag','txt')">By bag (TXT)</button>
          <button onclick="doTripExport('bag','pdf')">By bag (PDF)</button>
        </div>
      </div>
      <div class="menu-dropdown">
        <button class="btn-secondary btn-icon-only" onclick="toggleMenu(event)" title="More">${icon('menu', 18)}</button>
        <div class="menu-panel ${menuOpen ? 'open' : ''}" id="trip-menu">
          <button onclick="promptEditTripDetails('${jsAttr(trip.id)}')">Trip details</button>
          <button onclick="togglePinTrip('${jsAttr(trip.id)}')">${pinned ? 'Unpin from widget' : 'Pin for home widget'}</button>
          <button onclick="promptBuddyCopy('${jsAttr(trip.id)}')">Buddy copy</button>
          <button onclick="shareRemaining('${jsAttr(trip.id)}')">Share remaining list</button>
          <button onclick="resetTrip('${jsAttr(trip.id)}')">Reset all checks</button>
          <button onclick="toggleArchiveTrip('${jsAttr(trip.id)}')">${trip.archived ? 'Restore from archive' : 'Archive trip'}</button>
          <button class="danger" onclick="deleteTrip('${jsAttr(trip.id)}')">Delete trip</button>
        </div>
      </div>
    </div>
    ${catsHtml}`;
}

function closeCelebrate() {
  document.getElementById('celebrate-overlay').classList.remove('open');
}

function openCelebrateOverlay(kind) {
  const overlay = document.getElementById('celebrate-overlay');
  const emoji = overlay.querySelector('.emoji');
  const title = overlay.querySelector('h3');
  const text = overlay.querySelector('p');
  const btn = overlay.querySelector('button');
  if (kind === 'return') {
    emoji.textContent = '🧳';
    title.textContent = 'Ready to head home!';
    text.textContent = 'All gear collected. Safe travels!';
    btn.textContent = 'Done';
  } else {
    emoji.textContent = '🤿';
    title.textContent = 'Ready to dive!';
    text.textContent = 'Everything is packed. Have a safe and fun trip!';
    btn.textContent = "Let's go";
  }
  overlay.classList.add('open');
}

function setTripSection(tripId, sectionId) {
  const trip = state.trips.find(t => t.id === tripId);
  if (trip) { trip.viewSection = sectionId; saveState(); navigate('trip', tripId); }
}

function toggleUnpackMode(tripId) {
  const trip = state.trips.find(t => t.id === tripId);
  if (!trip) return;
  trip.unpackMode = !trip.unpackMode;
  if (trip.unpackMode) trip.returnMode = false;
  saveState();
  showToast(trip.unpackMode ? 'Unpack mode on' : 'Pack mode');
  navigate('trip', tripId);
}

function toggleReturnMode(tripId) {
  const trip = state.trips.find(t => t.id === tripId);
  if (!trip) return;
  if (!trip.returnMode) {
    trip.returnMode = true;
    trip.unpackMode = false;
    trip.returnCelebrated = false;
    trip.items.forEach(i => { ensureItem(i); i.returnPacked = 0; });
    showToast('Return mode — check items as you pack for home');
  } else {
    trip.returnMode = false;
    showToast('Exit return mode');
  }
  saveState();
  navigate('trip', tripId);
}

function togglePinTrip(tripId) {
  ensureSettings();
  state.settings.pinnedTripId = state.settings.pinnedTripId === tripId ? null : tripId;
  saveState();
  showToast(state.settings.pinnedTripId ? 'Pinned for widget' : 'Unpinned');
  navigate('trip', tripId);
}

function toggleArchiveTrip(tripId) {
  const trip = state.trips.find(t => t.id === tripId);
  if (!trip) return;
  trip.archived = !trip.archived;
  saveState();
  showToast(trip.archived ? 'Trip archived' : 'Trip restored');
  if (trip.archived) navigate('home');
  else navigate('trip', tripId);
}

async function shareRemaining(tripId) {
  const trip = state.trips.find(t => t.id === tripId);
  if (!trip) return;
  const text = buildTripText(trip, 'remaining');
  if (navigator.share) {
    try { await navigator.share({ title: trip.name + ' — remaining', text }); return; } catch (e) {}
  }
  downloadBlob(text, `GIW_${dateStr()}_${safeFilename(trip.name)}_Remaining.txt`, 'text/plain');
}

function render() {
  const root = document.getElementById('app-root');
  if (screen === 'home') root.innerHTML = renderHome();
  else if (screen === 'trip') root.innerHTML = renderTrip();
  else if (screen === 'about') root.innerHTML = renderAbout();
  applyTheme();
}

function toggleExportMenu(e) {
  e.stopPropagation();
  exportMenuOpen = !exportMenuOpen;
  menuOpen = false;
  render();
}

function toggleMenu(e) {
  e.stopPropagation();
  menuOpen = !menuOpen;
  exportMenuOpen = false;
  render();
}

function doTripExport(mode, fmt) {
  exportMenuOpen = false;
  if (fmt === 'pdf') exportTripPDF(mode);
  else exportTripTXT(mode);
  render();
}

function doTemplateExport(fmt) {
  exportMenuOpen = false;
  if (fmt === 'pdf') exportTemplatePDF();
  else exportTemplateTXT();
  render();
}

document.addEventListener('click', () => {
  if (menuOpen || exportMenuOpen) {
    menuOpen = false;
    exportMenuOpen = false;
    render();
  }
});

// ── Template editing ──
function addCategory() {
  const order = state.masterTemplate.categories.length;
  state.masterTemplate.categories.push({ id: uid(), name: 'New Category', order });
  saveState(); stayInMasterGearEditor(); navigate('about');
}
function renameCategory(id, name) {
  const c = state.masterTemplate.categories.find(x => x.id === id);
  if (c) { c.name = name.trim() || c.name; saveState(); }
}
function deleteCategory(id) {
  if (!confirm('Delete this category and all its items?')) return;
  state.masterTemplate.categories = state.masterTemplate.categories.filter(c => c.id !== id);
  state.masterTemplate.items = state.masterTemplate.items.filter(i => i.categoryId !== id);
  saveState(); stayInMasterGearEditor(); navigate('about');
}
function moveCategory(id, dir) {
  const cats = getCategories();
  const idx = cats.findIndex(c => c.id === id);
  const swap = idx + dir;
  if (swap < 0 || swap >= cats.length) return;
  const tmp = cats[idx].order; cats[idx].order = cats[swap].order; cats[swap].order = tmp;
  saveState(); stayInMasterGearEditor(); navigate('about');
}
function addTemplateItem(catId) {
  const item = { id: uid(), categoryId: catId, name: 'New item', note: '', qty: 1, packed: 0, critical: false, bag: '', sections: [] };
  state.masterTemplate.items.push(item);
  saveState();
  stayInMasterGearEditor();
  openItemEditor('template', '', item.id);
}
function renameTemplateItem(id, name) {
  const it = state.masterTemplate.items.find(x => x.id === id);
  if (it) { it.name = name.trim() || it.name; saveState(); }
}
function deleteTemplateItem(id) {
  state.masterTemplate.items = state.masterTemplate.items.filter(i => i.id !== id);
  saveState(); stayInMasterGearEditor(); navigate('about');
}

// ── Trip actions ──
function getItemRef(type, tripId, itemId) {
  if (type === 'template') return state.masterTemplate.items.find(i => i.id === itemId);
  if (type === 'saved') {
    const tpl = getSavedTemplate(tripId);
    return tpl && tpl.items.find(i => i.id === itemId);
  }
  const trip = state.trips.find(t => t.id === tripId);
  return trip && trip.items.find(i => i.id === itemId);
}

function openItemEditor(type, tripId, itemId) {
  const it = getItemRef(type, tripId, itemId);
  if (!it) return;
  ensureItem(it);
  const sectionChecks = TRIP_SECTIONS.map(s =>
    `<label class="modal-check-row"><input type="checkbox" class="item-sec" value="${s.id}" ${it.sections.includes(s.id) ? 'checked' : ''}/> ${esc(s.label)}</label>`
  ).join('');
  const bagOptions = BAG_TAGS.map(b =>
    `<option value="${b.id}" ${it.bag === b.id ? 'selected' : ''}>${esc(b.label)}</option>`
  ).join('');
  openModal(`
    <h3>Edit item</h3>
    <div class="modal-field"><label>Name</label><input id="item-edit-name" value="${esc(it.name)}" autofocus/></div>
    <div class="modal-field"><label>Note</label><input id="item-edit-note" value="${esc(it.note || '')}" placeholder="e.g. 32% nitrox, dry bag #2"/></div>
    <div class="modal-field-row">
      <div class="modal-field"><label>Quantity</label><input id="item-edit-qty" type="number" min="1" max="99" value="${it.qty}"/></div>
      <div class="modal-field"><label>Bag / location</label>
        <select id="item-edit-bag" style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px;color:var(--text);font-size:14px">
          <option value="">— None —</option>${bagOptions}
        </select>
      </div>
    </div>
    <div class="modal-field"><label class="modal-check-row" style="cursor:pointer"><input type="checkbox" id="item-edit-critical" ${it.critical ? 'checked' : ''}/> Critical — must not forget</label></div>
    <div class="modal-field"><label>When to pack (leave empty = all phases)</label></div>
    <div class="modal-checklist">${sectionChecks}</div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" id="item-edit-save">Save</button>
    </div>
  `, () => {
    document.getElementById('item-edit-save').onclick = () => {
      const name = document.getElementById('item-edit-name').value.trim();
      if (!name) { showToast('Enter a name'); return; }
      it.name = name;
      it.note = document.getElementById('item-edit-note').value.trim();
      it.qty = Math.max(1, parseInt(document.getElementById('item-edit-qty').value, 10) || 1);
      it.bag = document.getElementById('item-edit-bag').value;
      it.critical = document.getElementById('item-edit-critical').checked;
      it.sections = [...document.querySelectorAll('.item-sec:checked')].map(el => el.value);
      if (it.packed > it.qty) it.packed = it.qty;
      it.checked = it.packed >= it.qty;
      saveState();
      closeModal();
      if (type === 'template') { stayInMasterGearEditor(); navigate('about'); }
      else if (type === 'saved') { aboutTab = 'starters'; openSavedTemplateEditor(tripId); }
      else navigate('trip', tripId);
    };
  });
}

function adjustItemQty(type, tripId, itemId, delta) {
  const it = getItemRef(type, tripId, itemId);
  if (!it) return;
  ensureItem(it);
  const trip = type === 'trip' ? state.trips.find(t => t.id === tripId) : null;
  if (trip && trip.returnMode) {
    it.returnPacked = Math.max(0, Math.min(it.qty, (it.returnPacked || 0) + delta));
  } else {
    it.packed = Math.max(0, Math.min(it.qty, it.packed + delta));
    it.checked = it.packed >= it.qty;
  }
  saveState();
  render();
}

function toggleTripItem(tripId, itemId) {
  const trip = state.trips.find(t => t.id === tripId);
  const it = trip && trip.items.find(i => i.id === itemId);
  if (!it) return;
  ensureItem(it);
  if (trip.returnMode) {
    if (it.qty > 1) {
      it.returnPacked = (it.returnPacked || 0) >= it.qty ? 0 : Math.min(it.qty, (it.returnPacked || 0) + 1);
    } else {
      it.returnPacked = (it.returnPacked || 0) >= it.qty ? 0 : it.qty;
    }
  } else if (trip.unpackMode) {
    if (it.packed > 0) it.packed--;
    it.checked = it.packed >= it.qty;
  } else if (it.qty > 1) {
    it.packed = it.packed >= it.qty ? 0 : Math.min(it.qty, it.packed + 1);
    it.checked = it.packed >= it.qty;
  } else {
    it.packed = it.packed >= it.qty ? 0 : it.qty;
    it.checked = it.packed >= it.qty;
  }
  saveState();
  render();
}

function nextCategoryCopyName(categories, sourceName) {
  const baseName = sourceName.replace(/\s*\(\d+\)\s*$/, '').trim();
  const escaped = baseName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp('^' + escaped + '(?: \\((\\d+)\\))?$');
  let max = 1;
  categories.forEach(c => {
    const m = c.name.match(re);
    if (m) max = Math.max(max, m[1] ? parseInt(m[1], 10) : 1);
  });
  return max === 1 ? baseName + ' (2)' : baseName + ' (' + (max + 1) + ')';
}

  if (!src) return;
  const order = Math.max(...trip.categories.map(c => c.order)) + 1;
  const newCatId = uid();
  const newName = nextCategoryCopyName(trip.categories, src.name);
  trip.categories.push({ id: newCatId, name: newName, order });
  trip.items.filter(i => i.categoryId === catId).forEach(it => {

function buildTemplateText() {
  const lines = [
    '═══════════════════════════════════════',
    '  GET IN WATER — Master Gear Template',
    '  Three Cats LSP · threecats-lsp.com',

function formatItemExportLine(it, mode, trip) {
  ensureItem(it);
  if (mode === 'remaining' && isItemPacked(it, trip)) return null;
  const mark = isItemPacked(it, trip) ? '[x]' : '[ ]';
  const count = trip && trip.returnMode ? (it.returnPacked || 0) : it.packed;
  let line = `  ${mark} ${itemDisplayName(it)}`;
  if (it.qty > 1 && count > 0 && count < it.qty) line += ` (${count}/${it.qty} ${trip && trip.returnMode ? 'collected' : 'packed'})`;
  if (it.note) line += ' — ' + it.note;
  if (it.critical) line += ' ★';
  return line;
}

function buildTripText(trip, mode) {
  const p = tripProgress(trip);
  ensureTripShape(trip);
  const lines = [
    '═══════════════════════════════════════',
    '  GET IN WATER — Trip Packing List',
    '  Three Cats LSP · threecats-lsp.com',
    '═══════════════════════════════════════',
    `Trip: ${trip.name}`,
    trip.location ? `Location: ${trip.location}` : '',
    formatTripDateRange(trip) ? `Dates: ${formatTripDateRange(trip)}` : '',
    (trip.tags && trip.tags.length) ? `Tags: ${trip.tags.join(' ')}` : '',
    `Progress: ${p.done}/${p.total} ${trip.returnMode ? 'collected' : 'packed'}`,
    trip.returnMode ? '(Return mode — trip home checklist)' : '',
    mode === 'remaining' ? '(Remaining items only)' : '',
    mode === 'bag' ? '(Grouped by bag / location)' : '',
    ''
  ].filter(Boolean);

  if (mode === 'bag') {
    const groups = {};
    const items = trip.items;
    items.forEach(it => {
      ensureItem(it);
      const key = it.bag || '_none';
      if (!groups[key]) groups[key] = [];
      groups[key].push(it);
    });
    const order = ['carry-on', 'checked', 'camera', 'boat', '_none'];
    order.forEach(key => {
      if (!groups[key] || !groups[key].length) return;
      const title = key === '_none' ? 'UNASSIGNED' : bagLabel(key).toUpperCase();
      lines.push(`▸ ${title}`);
      groups[key].forEach(it => {
        const row = formatItemExportLine(it, 'full', trip);
        if (row) lines.push(row);
      });
      lines.push('');
    });
    Object.keys(groups).filter(k => !order.includes(k)).forEach(key => {
      lines.push(`▸ ${key.toUpperCase()}`);
      groups[key].forEach(it => {
        const row = formatItemExportLine(it, 'full', trip);
        if (row) lines.push(row);
      });
      lines.push('');
    });
  } else {
    const cats = getTripCategories(trip);
    let items = trip.items;
    if (mode === 'remaining') items = items.filter(i => !isItemPacked(i, trip));
    const knownIds = new Set(cats.map(c => c.id));
    cats.forEach(cat => {
      const catItems = items.filter(i => i.categoryId === cat.id);
      if (!catItems.length) return;
      lines.push(`▸ ${cat.name.toUpperCase()}`);
      catItems.forEach(it => {
        const row = formatItemExportLine(it, mode, trip);
        if (row) lines.push(row);
      });
      lines.push('');
    });
    const otherItems = items.filter(i => !knownIds.has(i.categoryId));
    if (otherItems.length) {
      lines.push('▸ OTHER');
      otherItems.forEach(it => {
        const row = formatItemExportLine(it, mode, trip);
        if (row) lines.push(row);
      });
      lines.push('');
    }
  }
  lines.push('— Generated by Get In Water v' + APP_VERSION);
  return lines.join('\n');
}

function downloadBlob(text, filename, mime) {

  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
  showExportToast();
}

let _pdfFontCache = null;
async function loadPDFFonts(doc) {
  if (_pdfFontCache) {
    doc.addFileToVFS('DejaVuSans.ttf', _pdfFontCache.regular);
    doc.addFileToVFS('DejaVuSans-Bold.ttf', _pdfFontCache.bold);
    doc.addFont('DejaVuSans.ttf', 'DejaVuSans', 'normal');
    doc.addFont('DejaVuSans-Bold.ttf', 'DejaVuSans', 'bold');
    doc.setFont('DejaVuSans', 'normal');
    return true;
  }
  try {
    const [rResp, bResp] = await Promise.all([
      fetch('vendor/fonts/DejaVuSans.ttf'),
      fetch('vendor/fonts/DejaVuSans-Bold.ttf')
    ]);
    if (!rResp.ok || !bResp.ok) throw new Error('Font fetch failed');
    const [rBuf, bBuf] = await Promise.all([rResp.arrayBuffer(), bResp.arrayBuffer()]);
    function toBase64(buf) {
      const bytes = new Uint8Array(buf);
      const CHUNK = 8192;
      let bin = '';
      for (let i = 0; i < bytes.length; i += CHUNK) {
        bin += String.fromCharCode.apply(null, bytes.subarray(i, i + CHUNK));
      }
      return btoa(bin);
    }
    _pdfFontCache = { regular: toBase64(rBuf), bold: toBase64(bBuf) };
    doc.addFileToVFS('DejaVuSans.ttf', _pdfFontCache.regular);
    doc.addFileToVFS('DejaVuSans-Bold.ttf', _pdfFontCache.bold);
    doc.addFont('DejaVuSans.ttf', 'DejaVuSans', 'normal');
    doc.addFont('DejaVuSans-Bold.ttf', 'DejaVuSans', 'bold');
    doc.setFont('DejaVuSans', 'normal');
    return true;
  } catch (e) {
    console.error('[GIW] DejaVu font load failed:', e);
    alert('Could not load PDF fonts. Reinstall the app or refresh while online, then try again.');
    return false;
  }
}

const PDF_PW = 210;
const PDF_PH = 297;
const PDF_ML = 16;
const PDF_MR = 16;
const PDF_HEADER_H = 12;
const PDF_FOOTER_H = 8;
const PDF_CONTENT_TOP = PDF_HEADER_H + 3;
const PDF_CONTENT_BOT = PDF_PH - PDF_FOOTER_H - 3;
const PDF_CW = PDF_PW - PDF_ML - PDF_MR;
const PDF_SECTION_BAR_H = 6;
const PDF_SECTION_GAP = 4;

function formatPdfDate(dateStr) {

  }
  try {

  } catch (e) {

async function buildPdfDoc(meta, sections) {
  const { jsPDF } = window.jspdf;
  if (!jsPDF) { alert('PDF library not loaded.'); return null; }
  const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
  if (!(await loadPDFFonts(doc))) return null;

  let y = PDF_CONTENT_TOP;
  const nowStr = new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
  const tripDate = meta.date || formatPdfDate(meta.dateStart);

  function drawHeader() {
    doc.setFillColor(3, 12, 24);
    doc.rect(0, 0, PDF_PW, PDF_HEADER_H, 'F');
    doc.setFillColor(0, 180, 220);
    doc.roundedRect(PDF_ML, 2, 8, 8, 1.5, 1.5, 'F');
    doc.setFont('DejaVuSans', 'bold');
    doc.setFontSize(6.5);
    doc.setTextColor(255, 255, 255);
    doc.text('GIW', PDF_ML + 4, 7.2, { align: 'center' });
    doc.setFontSize(9);
    doc.text('GET IN WATER', PDF_ML + 11, 5.8);
    doc.setFont('DejaVuSans', 'normal');
    doc.setFontSize(7.5);
    doc.text(meta.tripLabel || 'Packing Checklist', PDF_ML + 11, 9.5);
    doc.text(tripDate, PDF_PW - PDF_MR, 5.8, { align: 'right' });
    if (meta.subtitle) {
      doc.setFontSize(6.5);
      doc.text(meta.subtitle, PDF_PW - PDF_MR, 9.2, { align: 'right' });
    }
    doc.setTextColor(0, 0, 0);
    y = PDF_CONTENT_TOP;
  }

  function drawFooter() {
    doc.setFillColor(235, 245, 252);
    doc.rect(0, PDF_PH - PDF_FOOTER_H, PDF_PW, PDF_FOOTER_H, 'F');
    doc.setFont('DejaVuSans', 'normal');
    doc.setFontSize(6.5);
    doc.setTextColor(70, 90, 110);
    doc.text('\u00a9 Three Cats LSP  \u00b7  @threecats_lsp  \u00b7  Have a safe and fun trip!', PDF_ML, PDF_PH - 3.2);
    doc.text('Exported ' + nowStr + '  \u00b7  v' + APP_VERSION, PDF_PW - PDF_MR, PDF_PH - 3.2, { align: 'right' });
    doc.setTextColor(0, 0, 0);
  }

  function checkY(need) {
    if (y + need > PDF_CONTENT_BOT) {
      drawFooter();
      doc.addPage();
      drawHeader();
    }
  }

  let sectionIndex = 0;

  function drawSectionTitle(title) {
    const gap = sectionIndex === 0 ? 0 : PDF_SECTION_GAP;
    sectionIndex += 1;
    checkY(gap + PDF_SECTION_BAR_H + 3);
    y += gap;
    doc.setFillColor(0, 130, 180);
    doc.rect(PDF_ML, y, PDF_CW, PDF_SECTION_BAR_H, 'F');
    doc.setFont('DejaVuSans', 'bold');
    doc.setFontSize(8);
    doc.setTextColor(255, 255, 255);
    doc.text(title, PDF_ML + 2, y + 4.2);
    doc.setTextColor(0, 0, 0);
    y += PDF_SECTION_BAR_H + 3;
  }

  function drawItemLine(line) {
    doc.setFont('DejaVuSans', 'normal');
    doc.setFontSize(9);
    const wrapped = doc.splitTextToSize(line, PDF_CW - 6);
    const blockH = PDF_ITEM_ROW_H * wrapped.length;
    checkY(blockH + 1.5);
    wrapped.forEach((row, i) => {
      doc.text(row, PDF_ML + 3, y + 3.8 + i * PDF_ITEM_ROW_H);
    });
    y += blockH + 1.5;
  }

  drawHeader();

  if (meta.modeLabel) {
    checkY(6);
    doc.setFont('DejaVuSans', 'normal');
    doc.setFontSize(8);
    doc.setTextColor(90, 110, 130);
    doc.text(meta.modeLabel, PDF_ML, y + 3.2);
    doc.setTextColor(0, 0, 0);
    y += 6;
  }

  sections.forEach(sec => {
    drawSectionTitle(sec.title);
    sec.items.forEach(item => {
      const line = typeof item === 'string' ? item : item.line;
      drawItemLine(line);
    });
  });

  drawFooter();
  return doc;
}

async function exportTemplatePDF() {
  const sections = getCategories().map(cat => ({

    items: state.masterTemplate.items
      .filter(i => i.categoryId === cat.id)
      .map(it => '\u2022  ' + it.name)
  }));
  const doc = await buildPdfDoc({
    tripLabel: 'Master Gear Template',
    date: '',

  }, sections);

  }
}

async function exportTripPDF(mode) {
  const trip = state.trips.find(t => t.id === activeTripId);
  if (!trip) return;
  ensureTripShape(trip);
  const p = tripProgress(trip);
  let items = trip.items;
  if (mode === 'remaining') items = items.filter(i => !isItemPacked(i, trip));

  let sections;
  if (mode === 'bag') {
    const groups = {};
    items.forEach(it => {
      ensureItem(it);
      const key = it.bag || '_none';
      if (!groups[key]) groups[key] = [];
      groups[key].push(it);
    });
    const bagOrder = ['carry-on', 'checked', 'camera', 'boat', '_none'];
    const itemLine = it => (isItemPacked(it, trip) ? '\u2611  ' : '\u2610  ') + itemDisplayName(it) + (it.note ? ' — ' + it.note : '');
    sections = [];
    bagOrder.forEach(key => {
      if (!groups[key] || !groups[key].length) return;
      sections.push({ title: key === '_none' ? 'Unassigned' : bagLabel(key), items: groups[key].map(itemLine) });
    });
    Object.keys(groups).filter(k => !bagOrder.includes(k)).sort().forEach(key => {
      sections.push({ title: bagLabel(key) || key, items: groups[key].map(itemLine) });
    });
  } else {
    sections = getTripCategories(trip).map(cat => ({
      title: cat.name,
      items: items.filter(i => i.categoryId === cat.id).map(it => (isItemPacked(it, trip) ? '\u2611  ' : '\u2610  ') + itemDisplayName(it) + (it.note ? ' — ' + it.note : ''))
    })).filter(sec => sec.items.length);
    const knownIds = new Set(getTripCategories(trip).map(c => c.id));
    const orphanItems = items.filter(i => !knownIds.has(i.categoryId));
    if (orphanItems.length) {
      sections.push({
        title: 'Other',
        items: orphanItems.map(it => (isItemPacked(it, trip) ? '\u2611  ' : '\u2610  ') + itemDisplayName(it))
      });
    }
  }

  const subtitleParts = [p.done + '/' + p.total + ' packed'];
  if (trip.location) subtitleParts.unshift(trip.location);
  const doc = await buildPdfDoc({
    tripLabel: trip.name,
    date: formatTripDateRange(trip),
    subtitle: subtitleParts.join(' · '),
    modeLabel: mode === 'remaining' ? 'Remaining items only' : mode === 'bag' ? 'Grouped by bag' : ''
  }, sections);

  const tag = mode === 'remaining' ? 'Remaining' : mode === 'bag' ? 'ByBag' : 'Full';
  if (!doc) { showToast('PDF export failed'); return; }
  try {
    doc.save('GIW_' + dateStr() + '_' + safeFilename(trip.name) + '_' + tag + '.pdf');
    showExportToast();
  } catch (e) {
    showToast('PDF export failed');
  }
}

    persistLocal: persistLocalOnly,
    saveState,
    render,
    migrateState,
    showToast,
    openModal,
    closeModal,
    uid,
    isNative: IS_NATIVE,
    onStatusChange: onSyncStatusChange
  }).then(startApp).catch(startApp);
} else {
  startApp();
}

if (window.Capacitor && Capacitor.isNativePlatform && Capacitor.isNativePlatform()) {
  const appPlugin = Capacitor.Plugins && Capacitor.Plugins.App;
  if (appPlugin && appPlugin.addListener) {
    appPlugin.addListener('appStateChange', ({ isActive }) => {
      if (isActive) {
        updateWidgetSnapshot();
        if (window.GIW_SYNC && GIW_SYNC.isSignedIn()) {
          GIW_SYNC.pullIfNewer().catch(() => {});
        }
      }
    });
  }
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) updateWidgetSnapshot();
  });
}
