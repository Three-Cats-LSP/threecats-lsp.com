<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T-Viewer — Download APK</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #030c18;
      color: #e0f7ff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #071a2e;
      border: 1px solid rgba(0,200,255,0.2);
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .logo { font-size: 48px; margin-bottom: 8px; }
    h1 { font-size: 22px; color: #00c8ff; margin-bottom: 6px; }
    p { font-size: 14px; color: #7fb8cc; margin-bottom: 28px; line-height: 1.5; }
    .btn {
      display: inline-block;
      background: #00c8ff;
      color: #000;
      font-weight: 700;
      font-size: 16px;
      padding: 14px 32px;
      border-radius: 30px;
      text-decoration: none;
      margin-bottom: 16px;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.8; }
    .note { font-size: 12px; color: #4a7a8a; line-height: 1.6; margin-top: 20px; }
    .status { font-size: 13px; color: #00c8ff; margin-top: 12px; min-height: 20px; }
    .back { display: block; margin-top: 28px; font-size: 12px; color: #4a7a8a; text-decoration: none; }
    .back:hover { color: #7fb8cc; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📄</div>
    <h1>T-Viewer</h1>
    <p>Lightweight text viewer for LSP deco logs</p>

    <button class="btn" id="dlBtn">⬇ Download APK</button>

    <div class="status" id="status"></div>

    <div class="note">
      After downloading, open the APK file to install.<br>
      You may need to allow <em>Install from unknown sources</em> in Settings.
    </div>

    <a class="back" href="https://threecats-lsp.com/t-viewer/">← Open web version</a>
  </div>

  <script>
    const btn    = document.getElementById('dlBtn');
    const status = document.getElementById('status');
    const APK_URL = 'https://threecats-lsp.com/t-viewer/T-Viewer.apk';

    btn.addEventListener('click', function() {
      status.textContent = 'Starting download…';
      btn.style.opacity = '0.6';
      btn.style.pointerEvents = 'none';

      fetch(APK_URL)
        .then(r => {
          if (!r.ok) throw new Error('Network error ' + r.status);
          return r.blob();
        })
        .then(blob => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'T-Viewer.apk';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          setTimeout(() => URL.revokeObjectURL(url), 5000);
          status.textContent = '✓ Download started — check your notifications';
          btn.style.opacity = '1';
          btn.style.pointerEvents = '';
        })
        .catch(() => {
          status.textContent = 'Redirecting… tap Save if prompted';
          window.location.href = APK_URL;
          btn.style.opacity = '1';
          btn.style.pointerEvents = '';
        });
    });
  </script>
</body>
</html>
